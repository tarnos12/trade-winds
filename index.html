<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Trade Winds</title>
<style>
  :root {
    --paper: #f2e6cf;
    --ink: #3b2f22;
    --panel: rgba(28, 22, 15, 0.86);
    --panel-edge: #6b5636;
    --accent: #c98a3c;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; overflow: hidden; background: #14110c; }
  body {
    font-family: "Georgia", "Iowan Old Style", serif;
    color: var(--paper);
    -webkit-user-select: none; user-select: none;
  }
  #game { position: fixed; inset: 0; display: block; cursor: grab; }
  #game.panning { cursor: grabbing; }
  #game.building { cursor: crosshair; }

  /* ---- Top bar ---- */
  #topbar {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px;
    background: linear-gradient(180deg, rgba(20,16,10,0.92), rgba(20,16,10,0.0));
    pointer-events: none;
  }
  #topbar > * { pointer-events: auto; }
  .brand { font-weight: bold; font-size: 18px; letter-spacing: 0.5px; color: var(--accent); text-shadow: 0 1px 2px #000; }
  .brand small { color: var(--paper); opacity: 0.6; font-weight: normal; font-size: 12px; }

  .group {
    display: flex; align-items: center; gap: 6px;
    background: var(--panel); border: 1px solid var(--panel-edge);
    border-radius: 8px; padding: 5px 8px;
  }
  label.seedlbl { font-size: 12px; opacity: 0.8; }
  input#seed {
    width: 120px; background: #1c160f; color: var(--paper);
    border: 1px solid var(--panel-edge); border-radius: 5px;
    padding: 4px 6px; font-family: inherit; font-size: 13px;
  }
  button {
    font-family: inherit; font-size: 13px; color: var(--paper);
    background: #3a2e1d; border: 1px solid var(--panel-edge);
    border-radius: 6px; padding: 5px 10px; cursor: pointer;
    transition: background 0.12s, border-color 0.12s;
  }
  button:hover { background: #4d3c24; }
  button.tool.active { background: var(--accent); color: #201607; border-color: #e0a860; font-weight: bold; }
  .spacer { flex: 1; }

  /* ---- Bottom hint ---- */
  #hint {
    position: fixed; left: 12px; bottom: 12px;
    background: var(--panel); border: 1px solid var(--panel-edge);
    border-radius: 8px; padding: 8px 12px; font-size: 12.5px; max-width: 420px;
    line-height: 1.5; opacity: 0.92;
  }
  #hint b { color: var(--accent); }
  kbd {
    display: inline-block; background: #1c160f; border: 1px solid var(--panel-edge);
    border-bottom-width: 2px; border-radius: 4px; padding: 0 5px; font-size: 11px;
    font-family: inherit;
  }

  /* ---- HUD (perf/status) ---- */
  #hud {
    position: fixed; right: 12px; bottom: 12px;
    background: var(--panel); border: 1px solid var(--panel-edge);
    border-radius: 8px; padding: 7px 10px; font-size: 12px;
    font-variant-numeric: tabular-nums; text-align: right; line-height: 1.45;
  }
  #hud .fps { color: var(--accent); font-weight: bold; }
  #hud .warn { color: #e06b4a; }

  /* === TOWN-UI CSS START === (T6 / slot #4 — town panel) */
  #townPanel {
    position: fixed; top: 56px; right: 12px; width: 320px;
    max-height: calc(100vh - 84px);
    display: flex; flex-direction: column;
    background: var(--panel); border: 1px solid var(--panel-edge);
    border-radius: 10px; box-shadow: 0 6px 22px rgba(0,0,0,0.5);
    font-size: 13px; z-index: 20; overflow: hidden;
  }
  #townPanel.hidden { display: none; }
  .tp-head {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 12px; border-bottom: 1px solid var(--panel-edge);
    background: linear-gradient(180deg, rgba(201,138,60,0.18), rgba(0,0,0,0));
  }
  .tp-title { font-weight: bold; color: var(--accent); font-size: 15px; flex: 1; }
  .tp-title .tp-lvl {
    font-size: 11px; color: var(--paper); opacity: 0.75; font-weight: normal;
    border: 1px solid var(--panel-edge); border-radius: 4px; padding: 1px 5px; margin-left: 4px;
  }
  .tp-close {
    padding: 2px 8px; font-size: 13px; line-height: 1.2;
    background: transparent; border-color: transparent;
  }
  .tp-close:hover { background: #4d3c24; }
  .tp-tabs { display: flex; gap: 2px; padding: 6px 8px 0; }
  .tp-tab {
    flex: 1; padding: 5px 2px; font-size: 11.5px; border-radius: 6px 6px 0 0;
    border-bottom: none; opacity: 0.75;
  }
  .tp-tab.active { background: var(--accent); color: #201607; font-weight: bold; opacity: 1; }
  .tp-body { padding: 10px 12px 14px; overflow-y: auto; line-height: 1.5; }
  .tp-row { display: flex; justify-content: space-between; gap: 10px; padding: 2px 0; }
  .tp-row .k { opacity: 0.8; }
  .tp-row .v { font-variant-numeric: tabular-nums; }
  .tp-sec { margin: 4px 0 6px; font-weight: bold; color: var(--accent); font-size: 11px;
            text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.85; }
  .tp-bar { height: 8px; border-radius: 4px; background: #1c160f; border: 1px solid var(--panel-edge); overflow: hidden; margin: 3px 0 8px; }
  .tp-bar > span { display: block; height: 100%; background: linear-gradient(90deg, #b06b2c, var(--accent)); }
  table.tp-tbl { width: 100%; border-collapse: collapse; font-variant-numeric: tabular-nums; }
  table.tp-tbl th, table.tp-tbl td { text-align: right; padding: 2px 4px; }
  table.tp-tbl th:first-child, table.tp-tbl td:first-child { text-align: left; }
  table.tp-tbl th { font-size: 10.5px; opacity: 0.7; border-bottom: 1px solid var(--panel-edge); font-weight: normal; }
  table.tp-tbl tr.dim td { opacity: 0.4; }
  .trend.up { color: #6fbf73; }
  .trend.down { color: #e0503c; }
  .trend.flat { color: var(--paper); opacity: 0.5; }
  .tp-empty { opacity: 0.6; font-style: italic; padding: 6px 0; }
  /* build menu (TI-C) */
  .tp-build { display: flex; justify-content: space-between; align-items: center; gap: 8px;
    padding: 5px 7px; margin: 3px 0; border: 1px solid var(--panel-edge); border-radius: 6px;
    background: #1c160f; cursor: pointer; }
  .tp-build:hover { background: #2a2015; border-color: var(--accent); }
  .tp-build.active { background: var(--accent); color: #201607; border-color: var(--accent); }
  .tp-build.disabled { opacity: 0.4; cursor: not-allowed; }
  .tp-build.disabled:hover { background: #1c160f; border-color: var(--panel-edge); }
  .tp-build .bn { font-weight: bold; }
  .tp-build .bm { font-size: 10.5px; opacity: 0.8; text-align: right; white-space: nowrap; }
  .tp-build.active .bm { opacity: 0.9; }
  .tp-place { display: flex; align-items: center; flex-wrap: wrap; gap: 6px;
    padding: 6px 8px; margin: 4px 0 8px; border-radius: 6px;
    background: rgba(111,191,115,0.12); border: 1px solid #4f9d5a; font-size: 12px; }
  .tp-place #tpPlaceHint { flex: 1 0 100%; font-size: 11px; opacity: 0.85; }
  .tp-place #tpPlaceHint.ok { color: #6fbf73; }
  .tp-place #tpPlaceHint.bad { color: #e0503c; }
  .tp-cancel { padding: 2px 8px; font-size: 11px; }
  /* === TOWN-UI CSS END === */

  /* === CASTLE-UI CSS START === (T9 / slot #4 — treasury HUD + castle warehouse) */
  /* Treasury line in the shared HUD (keeps existing fps/stat intact). */
  #hud .treasury { color: var(--accent); font-weight: bold; }
  #hud .treasury .rate { color: var(--paper); opacity: 0.55; font-weight: normal; font-size: 11px; }
  /* Castle warehouse panel — reuses the generic .tp-* look, own position/id. */
  #castlePanel {
    position: fixed; top: 56px; right: 12px; width: 340px;
    max-height: calc(100vh - 84px);
    display: flex; flex-direction: column;
    background: var(--panel); border: 1px solid var(--panel-edge);
    border-radius: 10px; box-shadow: 0 6px 22px rgba(0,0,0,0.5);
    font-size: 13px; z-index: 21; overflow: hidden;
  }
  #castlePanel.hidden { display: none; }
  .cw-summary { display: flex; gap: 10px; padding: 8px 12px; border-bottom: 1px solid var(--panel-edge); }
  .cw-summary .box { flex: 1; text-align: center; }
  .cw-summary .box .k { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.7; }
  .cw-summary .box .v { font-variant-numeric: tabular-nums; font-weight: bold; color: var(--accent); }
  .cw-cap { height: 6px; border-radius: 3px; background: #1c160f; border: 1px solid var(--panel-edge); overflow: hidden; margin: 0 12px 8px; }
  .cw-cap > span { display: block; height: 100%; background: linear-gradient(90deg, #b06b2c, var(--accent)); }
  table.cw-tbl { width: 100%; border-collapse: collapse; font-variant-numeric: tabular-nums; }
  table.cw-tbl th, table.cw-tbl td { padding: 3px 5px; text-align: right; }
  table.cw-tbl th:first-child, table.cw-tbl td:first-child { text-align: left; }
  table.cw-tbl th { font-size: 10.5px; opacity: 0.7; border-bottom: 1px solid var(--panel-edge); font-weight: normal; }
  table.cw-tbl tr.dim td { opacity: 0.45; }
  .cw-dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 5px; vertical-align: -1px; border: 1px solid rgba(0,0,0,0.4); }
  .cw-btn { padding: 1px 8px; font-size: 11px; line-height: 1.5; margin-left: 3px; }
  .cw-btn.buy { border-color: #6fbf73; color: #a6e0a8; }
  .cw-btn.sell { border-color: #e0844a; color: #f0b892; }
  .cw-btn:disabled { opacity: 0.3; cursor: default; }
  /* === CASTLE-UI CSS END === */

  /* === RESEARCH-UI CSS START === (P4-A / slot #2 — research tree panel) */
  #researchPanel {
    position: fixed; top: 56px; left: 12px; width: 560px; max-width: calc(100vw - 24px);
    max-height: calc(100vh - 84px);
    display: flex; flex-direction: column;
    background: var(--panel); border: 1px solid var(--panel-edge);
    border-radius: 10px; box-shadow: 0 6px 22px rgba(0,0,0,0.5);
    font-size: 13px; z-index: 22; overflow: hidden;
  }
  #researchPanel.hidden { display: none; }
  #btnResearch.active { background: var(--accent); color: #201607; border-color: #e0a860; font-weight: bold; }
  .rs-active { padding: 8px 12px; border-bottom: 1px solid var(--panel-edge);
    background: linear-gradient(180deg, rgba(201,138,60,0.12), rgba(0,0,0,0)); }
  .rs-active .lbl { display: flex; justify-content: space-between; font-size: 11.5px; opacity: 0.85; margin-bottom: 4px; }
  .rs-active .lbl b { color: var(--accent); opacity: 1; }
  .rs-active.idle { opacity: 0.7; font-style: italic; }
  .rs-cols { display: flex; gap: 10px; padding: 10px 12px 14px; overflow-y: auto; }
  .rs-col { flex: 1; min-width: 0; }
  .rs-col h4 { margin: 0 0 6px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--accent); opacity: 0.9; text-align: center; }
  .rs-node { position: relative; padding: 7px 9px; margin: 0 0 8px;
    border: 1px solid var(--panel-edge); border-radius: 7px; background: #1c160f; }
  .rs-node .rn-name { font-weight: bold; font-size: 12.5px; }
  .rs-node .rn-desc { font-size: 10.5px; opacity: 0.7; line-height: 1.35; margin: 2px 0 5px; }
  .rs-node .rn-foot { display: flex; justify-content: space-between; align-items: center; gap: 6px; }
  .rs-node .rn-cost { font-size: 11px; font-variant-numeric: tabular-nums; opacity: 0.85; }
  .rs-node .rn-badge { font-size: 10px; padding: 1px 6px; border-radius: 4px; border: 1px solid var(--panel-edge); opacity: 0.85; }
  .rs-node.locked { opacity: 0.5; }
  .rs-node.locked .rn-badge { color: #c98a3c; }
  .rs-node.available { border-color: #6fa8d6; }
  .rs-node.available:hover { border-color: #a6cdea; background: #22201a; }
  .rs-node.available .rn-start { padding: 1px 9px; font-size: 11px; border-color: #6fbf73; color: #a6e0a8; }
  .rs-node.available .rn-start:disabled { opacity: 0.35; border-color: var(--panel-edge); color: var(--paper); cursor: default; }
  .rs-node.researching { border-color: var(--accent); background: #241a0f; }
  .rs-node.done { border-color: #4f9d5a; background: rgba(79,157,90,0.12); }
  .rs-node.done .rn-badge { color: #a6e0a8; border-color: #4f9d5a; }
  .rs-bar { height: 7px; border-radius: 4px; background: #120f0a; border: 1px solid var(--panel-edge);
    overflow: hidden; margin-top: 5px; }
  .rs-bar > span { display: block; height: 100%; background: linear-gradient(90deg, #b06b2c, var(--accent)); }
  /* === RESEARCH-UI CSS END === */
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="topbar">
  <div class="brand">Trade&nbsp;Winds <small>· build · trade · tariff</small></div>

  <div class="group">
    <label class="seedlbl" for="seed">Seed</label>
    <input id="seed" type="text" spellcheck="false" />
    <button id="btnGen" title="Generate a fresh map from this seed">Generate</button>
    <button id="btnRandom" title="Random seed">🎲</button>
  </div>

  <div class="group">
    <button class="tool" data-mode="pan" title="Pan the camera (drag)">✋ Pan</button>
    <button class="tool" data-mode="road" title="Paint roads (drag to draw)">🛣 Road</button>
    <button class="tool" data-mode="town" title="Place an empty town marker">🏰 Town</button>
    <button class="tool" data-mode="erase" title="Remove roads / town markers">🧹 Erase</button>
  </div>

  <div class="spacer"></div>

  <div class="group">
    <button id="btnResearch" title="Open the research tree">🔬 Research</button>
  </div>

  <div class="group">
    <button id="btnReveal" title="Toggle full-map reveal (debug)">👁 Fog</button>
    <button id="btnCenter" title="Recenter on the castle">🎯 Center</button>
  </div>
</div>

<div id="hint">
  <b>Drag</b> to pan · <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> move ·
  <b>Scroll</b> to zoom · pick <b>Road</b>/<b>Town</b> to build.
  Placing a town clears the fog around it.
</div>

<div id="hud">
  <!-- CASTLE-UI: player tariff treasury (T9) -->
  <div class="treasury">👑 <span id="treasuryVal">0</span> g <span class="rate" id="tariffVal"></span></div>
  <div><span class="fps" id="fps">—</span> fps</div>
  <div id="stat">—</div>
</div>

<!-- === TOWN-UI HTML START === (T6 / slot #4 — town panel, DOM over canvas) -->
<div id="townPanel" class="hidden" aria-hidden="true">
  <div class="tp-head">
    <div class="tp-title"><span id="tpName">Town</span><span class="tp-lvl" id="tpLevel">Lv 1</span></div>
    <button id="tpClose" class="tp-close" title="Close">✕</button>
  </div>
  <div class="tp-tabs">
    <button class="tp-tab active" data-tab="overview">Overview</button>
    <button class="tp-tab" data-tab="stock">Stock+Prices</button>
    <button class="tp-tab" data-tab="buildings">Buildings</button>
    <button class="tp-tab" data-tab="population">Population</button>
  </div>
  <div class="tp-body" id="tpBody"></div>
</div>
<!-- === TOWN-UI HTML END === -->

<!-- === CASTLE-UI HTML START === (T9 / slot #4 — castle warehouse panel) -->
<div id="castlePanel" class="hidden" aria-hidden="true">
  <div class="tp-head">
    <div class="tp-title">👑 Castle Warehouse</div>
    <button id="cwClose" class="tp-close" title="Close">✕</button>
  </div>
  <div class="cw-summary">
    <div class="box"><div class="k">Treasury</div><div class="v" id="cwTreasury">0 g</div></div>
    <div class="box"><div class="k">Market</div><div class="v" id="cwMarket">—</div></div>
    <div class="box"><div class="k">Storage</div><div class="v" id="cwCapText">0 / 0</div></div>
  </div>
  <div class="cw-cap"><span id="cwCapBar" style="width:0%"></span></div>
  <div class="tp-body" id="cwBody"></div>
</div>
<!-- === CASTLE-UI HTML END === -->

<!-- === RESEARCH-UI HTML START === (P4-A / slot #2 — research tree panel) -->
<div id="researchPanel" class="hidden" aria-hidden="true">
  <div class="tp-head">
    <div class="tp-title">🔬 Research</div>
    <button id="rsClose" class="tp-close" title="Close">✕</button>
  </div>
  <div id="rsActive" class="rs-active idle"></div>
  <div class="rs-cols" id="rsCols"></div>
</div>
<!-- === RESEARCH-UI HTML END === -->


<script>
"use strict";

/* =====================================================================
   PURE CORE  —  no DOM, no canvas, deterministic. Headless-testable.
   (The Node test in test/board.test.js evals everything between the
    PURE_CORE_START / PURE_CORE_END markers.)
   ===================================================================== */
/* PURE_CORE_START */

// Single source of truth for all balance/layout constants (GDD §9.1).
const CONFIG = {
  saveVersion: 1,
  // Biome mix is quantile-driven (see MapGen.generate): these are *target
  // fractions* of the board, so the map stays varied for any seed.
  map: {
    radius: 14, hexSize: 24, edgeFalloff: 0.55,
    frac: { water: 0.30, mountains: 0.07, hills: 0.11,     // of whole board / elevation bands
            forest: 0.28, fertile: 0.20, wasteland: 0.16 }, // of flat land / moisture bands
  },
  fog:    { castleReveal: 2, townReveal: 3 },
  camera: { minZoom: 0.32, maxZoom: 2.4, wheelStep: 1.12, panSpeed: 620 },
  econ:   { baseTickMs: 500 },
  terrain: {
    // buildable = a town marker / road may sit here (water needs a bridge, later)
    water:     { color: "#3f6079", buildable: false, road: false },
    meadow:    { color: "#8ba75a", buildable: true,  road: true  },
    forest:    { color: "#4d7738", buildable: true,  road: true  },
    hills:     { color: "#ac9560", buildable: true,  road: true  },
    mountains: { color: "#877f77", buildable: false, road: false },
    fertile:   { color: "#c2ad46", buildable: true,  road: true  },
    wasteland: { color: "#9c8b70", buildable: true,  road: true  },
  },
  fogColor: "#1b1710",
};

// Seeded PRNG — mulberry32 (GDD §9.1: MapGen uses mulberry32).
function mulberry32(a) {
  return function () {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// Turn any string seed into a 32-bit integer (so seeds can be words).
function hashSeed(str) {
  str = String(str);
  let h = 2166136261 >>> 0;
  for (let i = 0; i < str.length; i++) {
    h ^= str.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return h >>> 0;
}

// Pointy-top axial hex math (GDD §3.1, §9.1).
const HexMath = {
  DIRS: [[1, 0], [1, -1], [0, -1], [-1, 0], [-1, 1], [0, 1]],
  key(q, r) { return q + "," + r; },
  hexToPixel(q, r, size) {
    return { x: size * Math.sqrt(3) * (q + r / 2), y: size * 1.5 * r };
  },
  pixelToHex(x, y, size) {
    const q = (Math.sqrt(3) / 3 * x - 1 / 3 * y) / size;
    const r = (2 / 3 * y) / size;
    return HexMath.hexRound(q, r);
  },
  hexRound(q, r) {
    const s = -q - r;
    let rq = Math.round(q), rr = Math.round(r), rs = Math.round(s);
    const dq = Math.abs(rq - q), dr = Math.abs(rr - r), ds = Math.abs(rs - s);
    if (dq > dr && dq > ds) rq = -rr - rs;
    else if (dr > ds) rr = -rq - rs;
    return { q: rq, r: rr };
  },
  neighbors(q, r) {
    return HexMath.DIRS.map(d => ({ q: q + d[0], r: r + d[1] }));
  },
  dist(aq, ar, bq, br) {
    return (Math.abs(aq - bq) + Math.abs(ar - br) + Math.abs(aq + ar - bq - br)) / 2;
  },
  // All hexes within distance n of (cq,cr).
  range(cq, cr, n) {
    const out = [];
    for (let dq = -n; dq <= n; dq++) {
      const lo = Math.max(-n, -dq - n), hi = Math.min(n, -dq + n);
      for (let dr = lo; dr <= hi; dr++) out.push({ q: cq + dq, r: cr + dr });
    }
    return out;
  },
};

// Value-noise field with fractal Brownian motion (GDD §9.1: noise → biomes).
function makeValueNoise(seed) {
  function hash(ix, iy) {
    let h = (Math.imul(ix | 0, 374761393) + Math.imul(iy | 0, 668265263)) ^ seed;
    h = Math.imul(h ^ (h >>> 13), 1274126177);
    h ^= h >>> 16;
    return (h >>> 0) / 4294967296;
  }
  const smooth = t => t * t * (3 - 2 * t);
  function noise2(x, y) {
    const x0 = Math.floor(x), y0 = Math.floor(y);
    const sx = smooth(x - x0), sy = smooth(y - y0);
    const n00 = hash(x0, y0), n10 = hash(x0 + 1, y0);
    const n01 = hash(x0, y0 + 1), n11 = hash(x0 + 1, y0 + 1);
    const ix0 = n00 + (n10 - n00) * sx;
    const ix1 = n01 + (n11 - n01) * sx;
    return ix0 + (ix1 - ix0) * sy;
  }
  return function fbm(x, y, octaves) {
    octaves = octaves || 4;
    let amp = 1, freq = 1, sum = 0, norm = 0;
    for (let o = 0; o < octaves; o++) {
      sum += amp * noise2(x * freq, y * freq);
      norm += amp; amp *= 0.5; freq *= 2;
    }
    return sum / norm;
  };
}

// Deterministic seeded map generation (GDD §3).
const MapGen = {
  // Value at fraction f (0..1) through a sorted ascending array.
  quantile(sortedAsc, f) {
    if (sortedAsc.length === 0) return 0;
    const i = Math.min(sortedAsc.length - 1, Math.max(0, Math.round(f * (sortedAsc.length - 1))));
    return sortedAsc[i];
  },
  // Returns { seed, radius, hexes: Map<key, hex> }.
  // Two passes: (1) sample raw elevation+moisture noise per hex; (2) pick
  // biome thresholds by quantile so the terrain mix matches CONFIG.map.frac
  // for any seed (fixed cutoffs drift with the noise's mean; quantiles don't).
  generate(seedInput, radius) {
    radius = radius || CONFIG.map.radius;
    const F = CONFIG.map.frac;
    const seed = hashSeed(seedInput);
    const elevN = makeValueNoise(seed);
    const moistN = makeValueNoise(seed ^ 0x9e3779b9);

    // ---- pass 1: sample fields ----
    const hexes = new Map();
    for (let q = -radius; q <= radius; q++) {
      const lo = Math.max(-radius, -q - radius), hi = Math.min(radius, -q + radius);
      for (let r = lo; r <= hi; r++) {
        const d = HexMath.dist(0, 0, q, r) / radius;     // 0 centre → 1 rim
        const falloff = d * d * CONFIG.map.edgeFalloff;  // island bias: rim sinks
        const elev = elevN(q * 0.11 + 100, r * 0.11 + 100, 4) - falloff;
        const moist = moistN(q * 0.13 + 40, r * 0.13 + 40, 4);
        hexes.set(HexMath.key(q, r), { q, r, terrain: null, elevation: elev, moisture: moist, revealed: false });
      }
    }
    const all = Array.from(hexes.values());

    // ---- pass 2: quantile thresholds → biomes ----
    const elevs = all.map(h => h.elevation).sort((a, b) => a - b);
    const seaT  = MapGen.quantile(elevs, F.water);
    // elevation bands are measured over LAND only (above sea)
    const landElevs = elevs.filter(e => e >= seaT);
    const mtnT  = MapGen.quantile(landElevs, 1 - F.mountains);
    const hillT = MapGen.quantile(landElevs, 1 - F.mountains - F.hills);

    // moisture bands are measured over FLAT land (not hill/mountain)
    const flatMoist = all
      .filter(h => h.elevation >= seaT && h.elevation < hillT)
      .map(h => h.moisture).sort((a, b) => a - b);
    const forestT = MapGen.quantile(flatMoist, 1 - F.forest);
    const fertT   = MapGen.quantile(flatMoist, 1 - F.forest - F.fertile);
    const wasteT  = MapGen.quantile(flatMoist, F.wasteland);

    for (const h of all) {
      if (h.elevation < seaT)       h.terrain = "water";
      else if (h.elevation >= mtnT) h.terrain = "mountains";
      else if (h.elevation >= hillT) h.terrain = "hills";
      else if (h.moisture >= forestT) h.terrain = "forest";
      else if (h.moisture >= fertT)   h.terrain = "fertile";
      else if (h.moisture <  wasteT)  h.terrain = "wasteland";
      else                            h.terrain = "meadow";
    }

    // The castle hub sits at map centre and must be buildable ground (GDD §3.3).
    const c = hexes.get(HexMath.key(0, 0));
    if (c && !CONFIG.terrain[c.terrain].buildable) { c.terrain = "meadow"; }
    return { seed, radius, hexes };
  },
};

// bufferTarget lives under econ (existing key) — merge in place so we don't
// clobber baseTickMs or anything a sibling slice added.
Object.assign(CONFIG.econ, {
  bufferTarget: 2.0,   // "comfortable" stock = bufferTarget × demand (GDD §6.1)
  priceSmoothing: 0.10, // lerp factor toward the target price each tick
  minDemand: 0.5,      // demand floor so priceFor never divides by ~0
});

// Sim — pure, deterministic economy namespace. THIS SLICE OWNS ONLY priceFor;
// the production/consumption tick (Sim.tick) is T4's slice. Declared with a
// guard so whichever Phase-2 slice loads first creates the namespace and the
// other just adds to it (single-file, no module system).
var Sim = (typeof Sim !== "undefined" && Sim) || {};

// Local price of one good in one town from stock vs demand (GDD §6.1):
//   ratio = stock / (demand * bufferTarget)
//   target = clamp(basePrice * (1.6 - 0.8*ratio), basePrice*0.4, basePrice*3.0)
// then lerp the town's stored price 10%/tick toward the target (anti-jitter).
// Demand is read from town.demand[goodId] when the sim provides it (T4), else a
// small floor keeps this well-defined. First read (no stored price) snaps to the
// target; later reads move gradually. Mutates town.prices[goodId] and returns it.
Sim.priceFor = function (town, goodId) {
  const good = CONFIG.goods[goodId];
  if (!good) return 0;
  const base = good.basePrice;
  const buffer = CONFIG.econ.bufferTarget;

  const stock = (town.stock && town.stock[goodId]) || 0;
  const rawDemand = (town.demand && town.demand[goodId]);
  const demand = Math.max(CONFIG.econ.minDemand, rawDemand || 0);

  const ratio = stock / (demand * buffer);
  const target = Math.min(base * 3.0, Math.max(base * 0.4, base * (1.6 - 0.8 * ratio)));

  if (!town.prices) town.prices = {};
  const prev = town.prices[goodId];
  const next = (prev === undefined || prev === null)
    ? target                                        // first read: snap to target
    : prev + (target - prev) * CONFIG.econ.priceSmoothing; // else: 10%/tick lerp
  town.prices[goodId] = next;
  return next;
};
// === GOODS-PRICES END ===

// === SIM-CORE START ===  (T4 / slot #2 — production + consumption economy tick)
// Pure, deterministic economy step (GDD §4.3, §5). No DOM / canvas / I/O — the
// only inputs are the passed State + the constant CONFIG; the only effect is
// mutating the towns in State. Composes with the T5 price model (Sim.priceFor)
// and the shared Town contract. Runs headless (test/sim.test.js) and is wired
// into the 500ms×gameSpeed accumulator in the browser loop. Same state in ⇒ same
// state out (no Math.random, no time) so it is safe to fast-forward / autoplay.

// Needs / population constants — merged non-destructively into CONFIG so this
// composes with the Phase-1 CONFIG and the T5 goods/prices merge.
Object.assign(CONFIG, {
  needs: {
    // Food is a CATEGORY (GDD §5.1 "food = fish / bread"): a town eats whatever
    // food it has; each unit satisfies `foodValue` of hunger (bread counts 2x).
    // Eaten in this fixed priority (best value first) so the tick is deterministic.
    foodOrder: ["bread", "fish", "grain"],
    foodValue: { bread: 2, fish: 1, grain: 1 },
    // Per-resident consumption per tick, by tier (GDD §4.2 needs table):
    //   peasants → food; workers → food + beer; burghers → food + beer + clothes.
    perCapita: {
      peasants: { food: 0.10 },
      workers:  { food: 0.10, beer: 0.05 },
      burghers: { food: 0.10, beer: 0.05, clothes: 0.03 },
    },
    growthThreshold: 0.9999, // per-tier need satisfaction at/above this => grow toward housing
    declineThreshold: 0.5,   // sustained per-tier satisfaction below this => decline
    declineAfterTicks: 3,    // consecutive low-satisfaction ticks before a tier declines
    growthRate: 0.03,        // fraction of free housing capacity a tier gains per tick
    declineRate: 0.05,       // fraction of a tier's population lost per decline tick
    // Work efficiency from happiness (0..100): factor = effMin + (h/100)*(effMax-effMin).
    effMin: 0.5, effMax: 1.2,
  },
});

// singular workerTier/houseTier -> plural pop bucket key (mirrors BUILDINGS_TIER_KEY).
const SIM_TIER_KEY = { peasant: "peasants", worker: "workers", burgher: "burghers" };

// Advance the whole economy by one tick. Mutates every town in State.towns:
//   worker assignment → production → consumption → happiness → population → prices.
//
// Sim OWNS worker assignment: buildings are placed with `workers:0` and this
// function derives each producer's effective `workers` every tick by distributing
// each tier's live population (peasants→extractors, workers→processors, …) across
// the buildings that accept it, capped by each building's `workerSlots`. Population
// itself is generated FROM HOUSING: each tier grows toward
//   capacity(peasant) = CONFIG.town.baseWorkers.peasants + housing.peasants
//   capacity(worker)  = housing.workers ; capacity(burgher) = housing.burghers
// (housing from Buildings.housingCapacity) when that tier's needs are met, and
// shrinks when they are not — so workers/burghers only appear once the matching
// cottages/manors exist AND food (+beer/+clothes) is satisfied.
Sim.tick = function (State) {
  if (!State || !State.towns) return State;
  const N = CONFIG.needs;
  const base = (CONFIG.town && CONFIG.town.baseWorkers) || {};
  const clamp0 = (x) => (x > 0 ? x : 0);

  for (const town of State.towns) {
    if (!town) continue;
    if (!town.stock) town.stock = {};
    if (!town.pop) town.pop = { peasants: 0, workers: 0, burghers: 0 };
    const stock = town.stock;
    const pop = town.pop;
    const buildings = Array.isArray(town.buildings) ? town.buildings : [];
    const demand = {};                 // rebuilt every tick (drives Sim.priceFor)
    const addDemand = (g, amt) => { if (amt > 0) demand[g] = (demand[g] || 0) + amt; };

    // Work efficiency from the PREVIOUS tick's happiness (default 100 => 1.2x).
    const h = (typeof town.happiness === "number") ? town.happiness : 100;
    const hf = N.effMin + (Math.min(100, Math.max(0, h)) / 100) * (N.effMax - N.effMin);

    // --- 0. Worker assignment (derived every tick) ---------------------
    // Greedy, deterministic fill in building array order: each producer draws
    // from its tier's remaining labour pool, up to workerSlots. Houses (and any
    // building without a workerTier) get 0. Sim WRITES b.workers here.
    const pool = {
      peasant: pop.peasants || 0,
      worker:  pop.workers  || 0,
      burgher: pop.burghers || 0,
    };
    for (const b of buildings) {
      const type = CONFIG.buildings[b.typeId];
      if (!type || type.kind === "house" || !type.workerTier || !(type.workerSlots > 0)) {
        b.workers = 0; continue;
      }
      const tier = type.workerTier;
      const avail = pool[tier] || 0;
      const take = Math.min(type.workerSlots, avail);
      b.workers = take > 0 ? take : 0;
      pool[tier] = avail - b.workers;
    }

    // --- 1. Production -------------------------------------------------
    // Each staffed building outputs ratePerWorker × assignedWorkers × happiness,
    // consuming its inputs (processors); throughput is throttled by missing inputs.
    for (const b of buildings) {
      const type = CONFIG.buildings[b.typeId];
      if (!type || !type.output) continue;
      const w = b.workers || 0;
      if (w <= 0) continue;
      // Inputs cap effective workers; record full desired input as demand.
      let effW = w;
      const inputs = type.inputs;
      if (inputs) {
        for (const gid in inputs) {
          const qty = inputs[gid];
          if (qty > 0) effW = Math.min(effW, (stock[gid] || 0) / qty);
          addDemand(gid, qty * w);
        }
      }
      if (effW <= 0) continue;          // inputs missing → building idles this tick
      if (inputs) for (const gid in inputs) stock[gid] = clamp0((stock[gid] || 0) - inputs[gid] * effW);
      const out = type.output;
      stock[out.goodId] = (stock[out.goodId] || 0) + out.ratePerWorker * effW * hf;
    }

    // --- 2. Consumption + per-need satisfaction ------------------------
    // foodSat is the shared category need; beerSat/clothesSat are computed even
    // when the consuming tier is empty (req<=0 → 1 if any is in stock, else 0) so
    // an empty tier can still test whether its need-good is AVAILABLE before growing.
    const totalPop = (pop.peasants || 0) + (pop.workers || 0) + (pop.burghers || 0);

    let foodSat = 1;
    if (totalPop > 0) {
      const foodReq = N.perCapita.peasants.food * totalPop; // same food rate all tiers
      let remaining = foodReq;
      for (const gid of N.foodOrder) {
        const val = N.foodValue[gid] || 1;
        const wantUnits = remaining > 0 ? remaining / val : 0;
        addDemand(gid, wantUnits);
        if (remaining <= 0) continue;
        const have = stock[gid] || 0;
        const consume = Math.min(have, wantUnits);
        stock[gid] = have - consume;
        remaining -= consume * val;
      }
      foodSat = foodReq > 0 ? (foodReq - clamp0(remaining)) / foodReq : 1;
    }

    const beerPop = (pop.workers || 0) + (pop.burghers || 0);
    const beerSat = needSat(stock, "beer", N.perCapita.workers.beer * beerPop, addDemand);
    const clothesSat = needSat(stock, "clothes", N.perCapita.burghers.clothes * (pop.burghers || 0), addDemand);

    // --- 3. Happiness (0..100) = average of ACTIVE need satisfactions ---
    const sats = [];
    if (totalPop > 0) {
      sats.push(foodSat);
      if (beerPop > 0) sats.push(beerSat);
      if ((pop.burghers || 0) > 0) sats.push(clothesSat);
    }
    const avgSat = sats.length ? sats.reduce((a, b) => a + b, 0) / sats.length : 1;
    town.happiness = totalPop > 0 ? avgSat * 100 : (town.happiness == null ? 100 : town.happiness);

    // --- 4. Population from housing: grow when a tier's needs are met, ---
    //         shrink (after a sustained low streak) when they are not.
    const housing = (typeof Buildings !== "undefined" && Buildings.housingCapacity)
      ? Buildings.housingCapacity(town)
      : { peasants: 0, workers: 0, burghers: 0 };
    const capacity = {
      peasants: (base.peasants || 0) + (housing.peasants || 0),
      workers:  (housing.workers  || 0),
      burghers: (housing.burghers || 0),
    };
    // Each tier is satisfied only if ALL its needs are (food; +beer; +beer+clothes).
    const tierSat = {
      peasants: foodSat,
      workers:  Math.min(foodSat, beerSat),
      burghers: Math.min(foodSat, beerSat, clothesSat),
    };
    if (!town._lowSat) town._lowSat = { peasants: 0, workers: 0, burghers: 0 };
    for (const tier in capacity) {
      const cap = capacity[tier];
      const sat = tierSat[tier];
      let n = pop[tier] || 0;
      if (sat >= N.growthThreshold) {
        town._lowSat[tier] = 0;
        const headroom = cap - n;
        if (headroom > 0) n += N.growthRate * headroom;   // grow toward housing capacity
      } else if (sat < N.declineThreshold) {
        town._lowSat[tier] = (town._lowSat[tier] || 0) + 1;
        if (town._lowSat[tier] >= N.declineAfterTicks) n *= (1 - N.declineRate); // "move away"
      } else {
        town._lowSat[tier] = 0;            // comfortable band: reset the streak
      }
      pop[tier] = Math.min(clamp0(n), cap); // clamp 0 <= pop <= capacity
    }

    // --- 5. Publish demand, then reprice every good (Sim.priceFor) -----
    town.demand = demand;
    if (!town.prices) town.prices = {};
    for (const gid in CONFIG.goods) Sim.priceFor(town, gid);

    // --- 6. No negative stockpiles ------------------------------------
    for (const gid in stock) if (!(stock[gid] > 0)) stock[gid] = 0;
  }
  return State;
};

// One deterministic secondary-need pass (beer / clothes). When the consuming tier
// is present (req>0) it records demand, eats from stock, and returns the satisfied
// ratio in 0..1. When the tier is empty (req<=0) it consumes nothing and reports
// pure AVAILABILITY (1 if any is in stock, else 0) so a zero-population tier can
// still gate its growth on whether the need-good exists. Hoisted; used by Sim.tick.
function needSat(stock, gid, req, addDemand) {
  if (req <= 0) return (stock[gid] || 0) > 0 ? 1 : 0;
  addDemand(gid, req);
  const have = stock[gid] || 0;
  const consume = Math.min(have, req);
  stock[gid] = have - consume;
  return consume / req;
}
// === SIM-CORE END ===

// === BUILDINGS-CORE START ===  (TI-A / slot #2 — placement rules + housing)
// Pure, deterministic placement/housing helpers for player-placed buildings.
// No DOM / canvas / Math.random / I/O — reads the game State + CONFIG + HexMath
// and mutates nothing. Composes with the redesigned CONFIG.buildings + CONFIG.town
// above. Headless-tested in test/buildings.test.js.
var Buildings = (typeof Buildings !== "undefined" && Buildings) || {};

// tier singular (workerTier/houseTier) -> plural pop bucket key.
const BUILDINGS_TIER_KEY = { peasant: "peasants", worker: "workers", burgher: "burghers" };

// Player-placeable building slots by town-center level (GDD §4.1: 3/5/7/9).
// Index 0 is unused; unknown levels fall back to 3.
Buildings.slotCap = function (level) {
  const caps = CONFIG.town.slotCap;
  return caps[level] || 3;
};

// Every placed building — house or producer — consumes one slot.
Buildings.usedSlots = function (town) {
  return (town && Array.isArray(town.buildings)) ? town.buildings.length : 0;
};

// Sum houseCapacity of placed houses, grouped by the tier they house.
// Returns { peasants, workers, burghers }.
Buildings.housingCapacity = function (town) {
  const cap = { peasants: 0, workers: 0, burghers: 0 };
  const list = (town && Array.isArray(town.buildings)) ? town.buildings : [];
  for (const b of list) {
    const def = CONFIG.buildings[b.typeId];
    if (!def || def.kind !== "house") continue;
    const key = BUILDINGS_TIER_KEY[def.houseTier];
    if (!key) continue;
    cap[key] += def.houseCapacity || 0;
  }
  return cap;

// May `typeId` be placed at hex (q,r) for `town` in the game `state`?
// Returns { ok:true } or { ok:false, reason:"…" }. Pure: reads only, no mutation.
Buildings.canPlace = function (state, town, typeId, q, r) {
  const def = CONFIG.buildings[typeId];
  if (!def) return { ok: false, reason: "Unknown building type" };
  if (!town) return { ok: false, reason: "No town" };

  // (a) hex exists on the map and is within the town's build radius.
  const map = state && state.map;
  const hex = map && map.hexes && map.hexes.get(HexMath.key(q, r));
  if (!hex) return { ok: false, reason: "No hex here" };
  if (HexMath.dist(town.q, town.r, q, r) > CONFIG.town.radius) {
    return { ok: false, reason: "Outside town radius" };
  }

  // (b) terrain rule.
  const terr = hex.terrain;
  const terrDef = CONFIG.terrain[terr];
  const isLand = !!(terrDef && terrDef.buildable);
  if (def.kind === "extractor" && def.adjacent) {
    // sits on buildable land bordering the required terrain (e.g. fishery→water)
    if (!isLand) return { ok: false, reason: "Needs buildable land" };
    const near = HexMath.neighbors(q, r).some(n => {
      const nh = map.hexes.get(HexMath.key(n.q, n.r));
      return nh && nh.terrain === def.adjacent;
    });
    if (!near) return { ok: false, reason: "Must border " + def.adjacent };
  } else if (def.kind === "extractor") {
    // sits directly on its resource hex (may be non-town-buildable, e.g. mountains)
    if (terr !== def.terrain) return { ok: false, reason: "Needs " + def.terrain + " terrain" };
  } else {
    // processor / house: any buildable land hex in the town.
    if (!isLand) return { ok: false, reason: "Needs buildable land" };
  }

  // (c) hex must be free: not a road, not another town's center, not this town's
  //     center, not already holding one of this town's buildings.
  const key = HexMath.key(q, r);
  if (state.roads && state.roads.has(key)) return { ok: false, reason: "A road is here" };
  if (Array.isArray(state.towns)) {
    for (const t of state.towns) {
      if (t !== town && t.q === q && t.r === r) return { ok: false, reason: "Another town is here" };
    }
  }
  if (town.q === q && town.r === r) return { ok: false, reason: "Town center is here" };
  const placed = Array.isArray(town.buildings) ? town.buildings : [];
  for (const b of placed) {
    if (b.q === q && b.r === r) return { ok: false, reason: "A building is already here" };
  }

  // (d) slot cap by town level.
  if (Buildings.usedSlots(town) >= Buildings.slotCap(town.level)) {
    return { ok: false, reason: "No free building slots" };
  }

  // (e) affordability: gold + each resource in the cost.
  const cost = def.cost || {};
  if ((cost.gold || 0) > (town.gold || 0)) return { ok: false, reason: "Not enough gold" };
  const stock = town.stock || {};
  for (const gid in cost) {
    if (gid === "gold") continue;
    if ((stock[gid] || 0) < cost[gid]) return { ok: false, reason: "Not enough " + gid };
  }

  return { ok: true };
};
// === BUILDINGS-CORE END ===

// === PATHING START ===
// Pure Dijkstra pathfinder over the road-node graph (GDD §9.1). No DOM/canvas,
// no Math.random. Nodes are road hex keys in state.roads PLUS the two town
// access hexes for a query; edges join adjacent nodes (HexMath.neighbors,
// uniform step cost 1 for dirt roads). A town at (q,r) joins the network if its
// own hex or a neighbour hex is a road, so route() implicitly adds the two
// endpoints and connects them to any road-adjacent hop. Routes are memoized and
// invalidated by Pathing.invalidate(), which the browser layer calls at every
// state.roads mutation so a stale route never survives a road change.
var Pathing = (typeof Pathing !== "undefined" && Pathing) || {};
(function () {
  const cache = new Map();   // "fromKey|toKey" -> {path,cost} | null

  Pathing.invalidate = function () { cache.clear(); };

  function parseKey(k) {
    const i = k.indexOf(",");
    return { q: parseInt(k.slice(0, i), 10), r: parseInt(k.slice(i + 1), 10) };
  }

  // Neighbour node keys of `key` within the graph. A hex is a graph node if it
  // is a road OR one of the two query endpoints. Endpoints connect to adjacent
  // road hexes (and directly to each other if adjacent), which realizes the
  // "town hex or a neighbour hex is a road" connection rule.
  function neighborNodes(key, roads, fromKey, toKey) {
    const { q, r } = parseKey(key);
    const out = [];
    for (const n of HexMath.neighbors(q, r)) {
      const nk = HexMath.key(n.q, n.r);
      if (roads.has(nk) || nk === fromKey || nk === toKey) out.push(nk);
    }
    return out;
  }

  // Dijkstra from fromKey to toKey over the road graph. Uniform edge cost 1.
  Pathing.route = function (state, fromKey, toKey) {
    const ck = fromKey + "|" + toKey;
    if (cache.has(ck)) return cache.get(ck);

    const roads = (state && state.roads) || new Set();
    let result = null;

    if (fromKey === toKey) {
      result = { path: [fromKey], cost: 0 };
    } else {
      const dist = new Map([[fromKey, 0]]);
      const prev = new Map();
      const visited = new Set();
      // Frontier scan (boards are small: hundreds of hexes). Picks the
      // unvisited node of least tentative distance each step.
      const frontier = new Map([[fromKey, 0]]);
      while (frontier.size) {
        let cur = null, curD = Infinity;
        for (const [k, d] of frontier) if (d < curD) { curD = d; cur = k; }
        frontier.delete(cur);
        if (visited.has(cur)) continue;
        visited.add(cur);
        if (cur === toKey) break;
        for (const nk of neighborNodes(cur, roads, fromKey, toKey)) {
          if (visited.has(nk)) continue;
          const nd = curD + 1;
          if (nd < (dist.has(nk) ? dist.get(nk) : Infinity)) {
            dist.set(nk, nd);
            prev.set(nk, cur);
            frontier.set(nk, nd);
          }
        }
      }
      if (dist.has(toKey)) {
        const path = [];
        let cur = toKey;
        while (cur !== undefined) { path.push(cur); cur = prev.get(cur); }
        path.reverse();
        result = { path, cost: dist.get(toKey) };
      }
    }

    cache.set(ck, result);
    return result;
  };
})();
// === PATHING END ===

// === TRADE START ===  (T8 / slot #3 — cart dispatch + transactions + tariff)
// Pure, deterministic trade layer (GDD §6.2–6.3). No DOM / canvas / I/O and NO
// Math.random — every cart-route decision draws from a seeded stream stored on
// State (state.tradeSeed), so the whole sim+trade step is reproducible and safe
// to fast-forward / autoplay. Wired into the 500ms accumulator right AFTER
// Sim.tick(state). It only READS prices (Sim.tick already republished them via
// Sim.priceFor) and mutates only town.stock / town.gold, state.carts and
// state.treasury (the player's tariff income). Mitigates the GDD §10 risk of
// carts looping/oscillating with a profit threshold, top-3 route randomness, and
// a per-town cart cap.
Object.assign(CONFIG, {
  trade: {
    tariffRate: 0.25,          // 25% of every inter-town transaction → treasury (GDD §6.3)
    profitThreshold: 5,        // min gross profit for a route to be worth dispatching
    distanceCostPerStep: 0.5,  // gold cost per road step, subtracted from route profit
    cartCapacity: 10,          // max units one cart carries per trip
    cartSpeed: 0.5,            // progress (0..1 along the path) added per tick
    maxCartsPerTown: 3,        // hard cap; the per-town cap also scales with level (1–3)
    topRandom: 3,              // pick among the top-N most profitable routes (anti-herding)
  },
});

var Trade = (typeof Trade !== "undefined" && Trade) || {};
(function () {
  // Current local price of a good in a town. Sim.tick republishes every price
  // each tick (Sim.priceFor), so we READ the stored value and only fall back to a
  // fresh computation when a town was never ticked — Trade never re-lerps a price,
  // staying a read-only observer of the price model (no hidden side effects).
  function priceOf(town, gid) {
    const p = town.prices && town.prices[gid];
    return (typeof p === "number") ? p : Sim.priceFor(town, gid);
  }

  const townKey = (t) => HexMath.key(t.q, t.r);

  // How many carts a town may run at once: capped by config AND by level
  // (level 2 → 1, level 3 → 2, level 4+ → 3) — the GDD's "1–3 carts by level".
  function cartCapFor(town, cfg) {
    return Math.max(0, Math.min(cfg.maxCartsPerTown, (town.level || 1) - 1));
  }

  // Count a town's live (not-done) outbound-or-returning carts.
  function activeCarts(carts, townId) {
    let n = 0;
    for (const c of carts) if (!c.done && c.fromId === townId) n++;
    return n;
  }

  // Advance the whole trade layer by one tick. Mutates State only.
  Trade.tick = function (state) {
    if (!state) return state;
    if (!Array.isArray(state.carts)) state.carts = [];
    if (typeof state.treasury !== "number") state.treasury = 0;
    if (typeof state.tradeSeed !== "number") state.tradeSeed = 0;
    const cfg = CONFIG.trade;
    const towns = state.towns || [];
    const byId = new Map(towns.map(t => [t.id, t]));

    // Deterministic per-tick RNG: seed from state.tradeSeed, then advance the seed
    // by a fixed LCG step (independent of how many draws we make this tick) so the
    // stream evolves reproducibly across ticks and never touches Math.random.
    const rng = mulberry32(state.tradeSeed | 0);
    state.tradeSeed = (Math.imul(state.tradeSeed | 0, 1664525) + 1013904223) | 0;

    // --- 1. Dispatch: each eligible town looks to SELL a surplus good abroad ---
    for (const home of towns) {
      if (!home || (home.level || 1) < 2 || !home.stock) continue;
      if (activeCarts(state.carts, home.id) >= cartCapFor(home, cfg)) continue;

      const fromKey = townKey(home);
      const offers = [];
      for (const dest of towns) {
        if (dest === home || !dest) continue;
        const route = Pathing.route(state, fromKey, townKey(dest));
        if (!route) continue;
        for (const gid in CONFIG.goods) {
          const available = home.stock[gid] || 0;
          if (available <= 0) continue;
          const load = Math.min(cfg.cartCapacity, available);
          const priceHome = priceOf(home, gid);
          const priceDest = priceOf(dest, gid);
          // GDD §6.2: profit = (priceThere − priceHere)*load − distanceCost.
          const profit = (priceDest - priceHome) * load - cfg.distanceCostPerStep * route.cost;
          if (profit > cfg.profitThreshold) {
            offers.push({ dest, gid, load, unitBuy: priceHome, route, profit });
          }
        }
      }
      if (!offers.length) continue;
      // Best profit first, with a stable tiebreak (dest id, then good id) so the
      // top-N slate is deterministic before the seeded pick chooses within it.
      offers.sort((a, b) =>
        b.profit - a.profit ||
        a.dest.id - b.dest.id ||
        (a.gid < b.gid ? -1 : a.gid > b.gid ? 1 : 0));
      const slate = offers.slice(0, cfg.topRandom);
      const pick = slate[Math.min(slate.length - 1, Math.floor(rng() * slate.length))];

      // Load the cargo: the home town ships the goods and fronts the buy cost.
      home.stock[pick.gid] = (home.stock[pick.gid] || 0) - pick.load;
      home.gold = (home.gold || 0) - pick.unitBuy * pick.load;

      state.carts.push({
        id: (state._nextCartId = (state._nextCartId || 0) + 1),
        fromId: home.id, toId: pick.dest.id,
        goodId: pick.gid, qty: pick.load, unitBuy: pick.unitBuy,
        path: pick.route.path.slice(),        // home → dest hex keys (contract shape)
        progress: 0, phase: "outbound", done: false,
        _proceeds: 0,                         // net sale proceeds carried home on return
      });
    }

    // --- 2. Advance carts; settle the transaction on arrival -----------------
    for (const cart of state.carts) {
      if (cart.done) continue;
      cart.progress += cfg.cartSpeed;
      if (cart.progress < 1) continue;
      cart.progress = 1;

      if (cart.phase === "outbound") {
        const dest = byId.get(cart.toId);
        if (!dest) { cart.done = true; continue; }   // destination vanished → scrap
        if (!dest.stock) dest.stock = {};
        const priceDest = priceOf(dest, cart.goodId);
        const value = priceDest * cart.qty;                  // transaction value
        const tariff = cfg.tariffRate * value;               // GDD §6.3: 25% cut
        dest.stock[cart.goodId] = (dest.stock[cart.goodId] || 0) + cart.qty; // dest gains stock
        dest.gold = (dest.gold || 0) - value;                // dest pays gold
        state.treasury += tariff;                            // → player's treasury
        cart._proceeds = value - tariff;                     // merchant nets value − tariff
        cart.phase = "return";                               // head home along the reversed path
        cart.progress = 0;
        cart.path = cart.path.slice().reverse();
      } else {
        const home = byId.get(cart.fromId);                  // home again: bank proceeds, retire
        if (home) home.gold = (home.gold || 0) + cart._proceeds;
        cart.done = true;
      }
    }

    // --- 3. Prune retired carts ---------------------------------------------
    if (state.carts.some(c => c.done)) state.carts = state.carts.filter(c => !c.done);

    return state;
  };
})();
// === TRADE END ===

// === RESEARCH-CORE START ===  (P4-A / slot #2 — research tree data + pure engine)
// Pure data + pure functions only (GDD §7.1). No DOM, no canvas, no Math.random,
// no I/O — deterministic so it runs headless and inside the fixed timestep.
// Contract: state.research = { unlocked:[ids], active:<id|null>, progress:<ticks>,
// spent:<gold paid so far on the active node> }.

// 3 branches × 5 nodes. Each node:

// `effect` is a plain data bag of queryable flags/multipliers. This slice does
// NOT wire the effects into Sim/Trade/Buildings (those live in other fenced

// Research.has(state, id) / Research.effect(state, key).
Object.assign(CONFIG, {

// Pure research engine. All queries take `state` and never mutate CONFIG.
const Research = {
  // The blank shape newGame/loadGame should install (also used to repair saves).
  fresh() { return { unlocked: [], active: null, progress: 0, spent: 0 }; },
  // Defensive normalizer for loaded/foreign data.
  normalize(r) {
    const f = Research.fresh();
    if (!r || typeof r !== "object") return f;
    f.unlocked = Array.isArray(r.unlocked) ? r.unlocked.filter(id => !!Research.get(id)) : [];
    f.active = (typeof r.active === "string" && Research.get(r.active)) ? r.active : null;
    f.progress = (typeof r.progress === "number" && r.progress >= 0) ? r.progress : 0;
    f.spent = (typeof r.spent === "number" && r.spent >= 0) ? r.spent : 0;
    if (!f.active) { f.progress = 0; f.spent = 0; }
    return f;
  },
  get(id) {
    const list = CONFIG.research || [];
    for (let i = 0; i < list.length; i++) if (list[i].id === id) return list[i];
    return null;
  },
  all() { return CONFIG.research || []; },
  branches() { return ["production", "logistics", "administration"]; },
  nodesIn(branch) { return Research.all().filter(n => n.branch === branch); },

  has(state, id) {
    return !!(state && state.research && state.research.unlocked.indexOf(id) >= 0);

  isActive(state, id) {

  // an affordability *gate*; the gold itself is spent over time in tick()).
  canStart(state, id) {
    const node = Research.get(id);
    if (!node || !state || !state.research) return false;
    if (state.research.active) return false;         // one project at a time
    if (Research.has(state, id)) return false;       // already researched
    if (!Research.prereqsMet(state, node)) return false;
    if ((state.treasury || 0) < node.cost) return false;
    return true;

  // in equal-value installments across timeTicks in tick(). (Documented choice.)
  start(state, id) {
    if (!Research.canStart(state, id)) return false;
    state.research.active = id;
    state.research.progress = 0;
    state.research.spent = 0;
    return true;
  },
  // Advance the active project one tick, paying the proportional installment of
  // its cost from state.treasury. If the treasury can't cover this tick's
  // installment the project STALLS (progress does not advance) until coin is
  // available — deterministic, no partial-price completions. On the final tick it
  // unlocks and clears `active`.
  tick(state) {
    if (!state || !state.research) return;
    const R = state.research;
    if (!R.active) return;
    const node = Research.get(R.active);
    if (!node) { R.active = null; R.progress = 0; R.spent = 0; return; }
    const total = Math.max(1, node.timeTicks | 0);
    const nextProgress = (R.progress || 0) + 1;
    const targetSpent = node.cost * (nextProgress / total);
    const due = targetSpent - (R.spent || 0);
    if (due > (state.treasury || 0) + 1e-9) return;   // can't afford → stall
    if (due > 0) {
      state.treasury = (state.treasury || 0) - due;
      R.spent = (R.spent || 0) + due;
    }
    R.progress = nextProgress;
    if (R.progress >= total) {
      if (R.unlocked.indexOf(node.id) < 0) R.unlocked.push(node.id);
      R.active = null; R.progress = 0; R.spent = 0;
    }
  },

  // Fraction 0..1 of the active project completed (0 if none).
  activeFraction(state) {
    if (!state || !state.research || !state.research.active) return 0;
    const node = Research.get(state.research.active);
    if (!node) return 0;
    return Math.max(0, Math.min(1, (state.research.progress || 0) / Math.max(1, node.timeTicks)));
  },
  // Aggregate an effect value across all UNLOCKED nodes so other systems can read
  // research without this file reaching into theirs. Multiplier keys (…Output,
  // …Capacity, …_mul) multiply; boolean flags OR; everything else sums. Returns
  // `fallback` when no unlocked node touches the key.

    return acc == null ? fallback : acc;
