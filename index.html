<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Trade Winds</title>
<style>
  :root {
    --paper: #f2e6cf;
    --ink: #3b2f22;
    --panel: rgba(28, 22, 15, 0.86);
    --panel-edge: #6b5636;
    --accent: #c98a3c;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; overflow: hidden; background: #14110c; }
  body {
    font-family: "Georgia", "Iowan Old Style", serif;
    color: var(--paper);
    -webkit-user-select: none; user-select: none;
  }
  #game { position: fixed; inset: 0; display: block; cursor: grab; }
  #game.panning { cursor: grabbing; }
  #game.building { cursor: crosshair; }

  /* ---- Top bar ---- */
  #topbar {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px;
    background: linear-gradient(180deg, rgba(20,16,10,0.92), rgba(20,16,10,0.0));
    pointer-events: none;
  }
  #topbar > * { pointer-events: auto; }
  .brand { font-weight: bold; font-size: 18px; letter-spacing: 0.5px; color: var(--accent); text-shadow: 0 1px 2px #000; }
  .brand small { color: var(--paper); opacity: 0.6; font-weight: normal; font-size: 12px; }

  .group {
    display: flex; align-items: center; gap: 6px;
    background: var(--panel); border: 1px solid var(--panel-edge);
    border-radius: 8px; padding: 5px 8px;
  }
  label.seedlbl { font-size: 12px; opacity: 0.8; }
  input#seed {
    width: 120px; background: #1c160f; color: var(--paper);
    border: 1px solid var(--panel-edge); border-radius: 5px;
    padding: 4px 6px; font-family: inherit; font-size: 13px;
  }
  button {
    font-family: inherit; font-size: 13px; color: var(--paper);
    background: #3a2e1d; border: 1px solid var(--panel-edge);
    border-radius: 6px; padding: 5px 10px; cursor: pointer;
    transition: background 0.12s, border-color 0.12s;
  }
  button:hover { background: #4d3c24; }
  button.tool.active { background: var(--accent); color: #201607; border-color: #e0a860; font-weight: bold; }
  .spacer { flex: 1; }

  /* ---- Bottom hint ---- */
  #hint {
    position: fixed; left: 12px; bottom: 12px;
    background: var(--panel); border: 1px solid var(--panel-edge);
    border-radius: 8px; padding: 8px 12px; font-size: 12.5px; max-width: 420px;
    line-height: 1.5; opacity: 0.92;
  }
  #hint b { color: var(--accent); }
  kbd {
    display: inline-block; background: #1c160f; border: 1px solid var(--panel-edge);
    border-bottom-width: 2px; border-radius: 4px; padding: 0 5px; font-size: 11px;
    font-family: inherit;
  }

  /* ---- HUD (perf/status) ---- */
  #hud {
    position: fixed; right: 12px; bottom: 12px;
    background: var(--panel); border: 1px solid var(--panel-edge);
    border-radius: 8px; padding: 7px 10px; font-size: 12px;
    font-variant-numeric: tabular-nums; text-align: right; line-height: 1.45;
  }
  #hud .fps { color: var(--accent); font-weight: bold; }
  #hud .warn { color: #e06b4a; }

  /* === TOWN-UI CSS START === (T6 / slot #4 — town panel) */
  #townPanel {
    position: fixed; top: 56px; right: 12px; width: 320px;
    max-height: calc(100vh - 84px);
    display: flex; flex-direction: column;
    background: var(--panel); border: 1px solid var(--panel-edge);
    border-radius: 10px; box-shadow: 0 6px 22px rgba(0,0,0,0.5);
    font-size: 13px; z-index: 20; overflow: hidden;
  }
  #townPanel.hidden { display: none; }
  .tp-head {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 12px; border-bottom: 1px solid var(--panel-edge);
    background: linear-gradient(180deg, rgba(201,138,60,0.18), rgba(0,0,0,0));
  }
  .tp-title { font-weight: bold; color: var(--accent); font-size: 15px; flex: 1; }
  .tp-title .tp-lvl {
    font-size: 11px; color: var(--paper); opacity: 0.75; font-weight: normal;
    border: 1px solid var(--panel-edge); border-radius: 4px; padding: 1px 5px; margin-left: 4px;
  }
  .tp-close {
    padding: 2px 8px; font-size: 13px; line-height: 1.2;
    background: transparent; border-color: transparent;
  }
  .tp-close:hover { background: #4d3c24; }
  .tp-tabs { display: flex; gap: 2px; padding: 6px 8px 0; }
  .tp-tab {
    flex: 1; padding: 5px 2px; font-size: 11.5px; border-radius: 6px 6px 0 0;
    border-bottom: none; opacity: 0.75;
  }
  .tp-tab.active { background: var(--accent); color: #201607; font-weight: bold; opacity: 1; }
  .tp-body { padding: 10px 12px 14px; overflow-y: auto; line-height: 1.5; }
  .tp-row { display: flex; justify-content: space-between; gap: 10px; padding: 2px 0; }
  .tp-row .k { opacity: 0.8; }
  .tp-row .v { font-variant-numeric: tabular-nums; }
  .tp-sec { margin: 4px 0 6px; font-weight: bold; color: var(--accent); font-size: 11px;
            text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.85; }
  .tp-bar { height: 8px; border-radius: 4px; background: #1c160f; border: 1px solid var(--panel-edge); overflow: hidden; margin: 3px 0 8px; }
  .tp-bar > span { display: block; height: 100%; background: linear-gradient(90deg, #b06b2c, var(--accent)); }
  table.tp-tbl { width: 100%; border-collapse: collapse; font-variant-numeric: tabular-nums; }
  table.tp-tbl th, table.tp-tbl td { text-align: right; padding: 2px 4px; }
  table.tp-tbl th:first-child, table.tp-tbl td:first-child { text-align: left; }
  table.tp-tbl th { font-size: 10.5px; opacity: 0.7; border-bottom: 1px solid var(--panel-edge); font-weight: normal; }
  table.tp-tbl tr.dim td { opacity: 0.4; }
  .trend.up { color: #6fbf73; }
  .trend.down { color: #e0503c; }
  .trend.flat { color: var(--paper); opacity: 0.5; }
  .tp-empty { opacity: 0.6; font-style: italic; padding: 6px 0; }
  /* === TOWN-UI CSS END === */

  /* === CASTLE-UI CSS START === (T9 / slot #4 — treasury HUD + castle warehouse) */
  /* Treasury line in the shared HUD (keeps existing fps/stat intact). */
  #hud .treasury { color: var(--accent); font-weight: bold; }
  #hud .treasury .rate { color: var(--paper); opacity: 0.55; font-weight: normal; font-size: 11px; }
  /* Castle warehouse panel — reuses the generic .tp-* look, own position/id. */
  #castlePanel {
    position: fixed; top: 56px; right: 12px; width: 340px;
    max-height: calc(100vh - 84px);
    display: flex; flex-direction: column;
    background: var(--panel); border: 1px solid var(--panel-edge);
    border-radius: 10px; box-shadow: 0 6px 22px rgba(0,0,0,0.5);
    font-size: 13px; z-index: 21; overflow: hidden;
  }
  #castlePanel.hidden { display: none; }
  .cw-summary { display: flex; gap: 10px; padding: 8px 12px; border-bottom: 1px solid var(--panel-edge); }
  .cw-summary .box { flex: 1; text-align: center; }
  .cw-summary .box .k { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.7; }
  .cw-summary .box .v { font-variant-numeric: tabular-nums; font-weight: bold; color: var(--accent); }
  .cw-cap { height: 6px; border-radius: 3px; background: #1c160f; border: 1px solid var(--panel-edge); overflow: hidden; margin: 0 12px 8px; }
  .cw-cap > span { display: block; height: 100%; background: linear-gradient(90deg, #b06b2c, var(--accent)); }
  table.cw-tbl { width: 100%; border-collapse: collapse; font-variant-numeric: tabular-nums; }
  table.cw-tbl th, table.cw-tbl td { padding: 3px 5px; text-align: right; }
  table.cw-tbl th:first-child, table.cw-tbl td:first-child { text-align: left; }
  table.cw-tbl th { font-size: 10.5px; opacity: 0.7; border-bottom: 1px solid var(--panel-edge); font-weight: normal; }
  table.cw-tbl tr.dim td { opacity: 0.45; }
  .cw-dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 5px; vertical-align: -1px; border: 1px solid rgba(0,0,0,0.4); }
  .cw-btn { padding: 1px 8px; font-size: 11px; line-height: 1.5; margin-left: 3px; }
  .cw-btn.buy { border-color: #6fbf73; color: #a6e0a8; }
  .cw-btn.sell { border-color: #e0844a; color: #f0b892; }
  .cw-btn:disabled { opacity: 0.3; cursor: default; }
  /* === CASTLE-UI CSS END === */
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="topbar">
  <div class="brand">Trade&nbsp;Winds <small>· build · trade · tariff</small></div>

  <div class="group">
    <label class="seedlbl" for="seed">Seed</label>
    <input id="seed" type="text" spellcheck="false" />
    <button id="btnGen" title="Generate a fresh map from this seed">Generate</button>
    <button id="btnRandom" title="Random seed">🎲</button>
  </div>

  <div class="group">
    <button class="tool" data-mode="pan" title="Pan the camera (drag)">✋ Pan</button>
    <button class="tool" data-mode="road" title="Paint roads (drag to draw)">🛣 Road</button>
    <button class="tool" data-mode="town" title="Place an empty town marker">🏰 Town</button>
    <button class="tool" data-mode="erase" title="Remove roads / town markers">🧹 Erase</button>
  </div>

  <div class="spacer"></div>

  <div class="group">
    <button id="btnReveal" title="Toggle full-map reveal (debug)">👁 Fog</button>
    <button id="btnCenter" title="Recenter on the castle">🎯 Center</button>
  </div>
</div>

<div id="hint">
  <b>Drag</b> to pan · <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> move ·
  <b>Scroll</b> to zoom · pick <b>Road</b>/<b>Town</b> to build.
  Placing a town clears the fog around it.
</div>

<div id="hud">
  <!-- CASTLE-UI: player tariff treasury (T9) -->
  <div class="treasury">👑 <span id="treasuryVal">0</span> g <span class="rate" id="tariffVal"></span></div>
  <div><span class="fps" id="fps">—</span> fps</div>
  <div id="stat">—</div>
</div>

<!-- === TOWN-UI HTML START === (T6 / slot #4 — town panel, DOM over canvas) -->
<div id="townPanel" class="hidden" aria-hidden="true">
  <div class="tp-head">
    <div class="tp-title"><span id="tpName">Town</span><span class="tp-lvl" id="tpLevel">Lv 1</span></div>
    <button id="tpClose" class="tp-close" title="Close">✕</button>
  </div>
  <div class="tp-tabs">
    <button class="tp-tab active" data-tab="overview">Overview</button>
    <button class="tp-tab" data-tab="stock">Stock+Prices</button>
    <button class="tp-tab" data-tab="buildings">Buildings</button>
    <button class="tp-tab" data-tab="population">Population</button>
  </div>
  <div class="tp-body" id="tpBody"></div>
</div>
<!-- === TOWN-UI HTML END === -->

<!-- === CASTLE-UI HTML START === (T9 / slot #4 — castle warehouse panel) -->
<div id="castlePanel" class="hidden" aria-hidden="true">
  <div class="tp-head">
    <div class="tp-title">👑 Castle Warehouse</div>
    <button id="cwClose" class="tp-close" title="Close">✕</button>
  </div>
  <div class="cw-summary">
    <div class="box"><div class="k">Treasury</div><div class="v" id="cwTreasury">0 g</div></div>
    <div class="box"><div class="k">Market</div><div class="v" id="cwMarket">—</div></div>
    <div class="box"><div class="k">Storage</div><div class="v" id="cwCapText">0 / 0</div></div>
  </div>
  <div class="cw-cap"><span id="cwCapBar" style="width:0%"></span></div>
  <div class="tp-body" id="cwBody"></div>
</div>
<!-- === CASTLE-UI HTML END === -->


<script>
"use strict";

/* =====================================================================
   PURE CORE  —  no DOM, no canvas, deterministic. Headless-testable.
   (The Node test in test/board.test.js evals everything between the
    PURE_CORE_START / PURE_CORE_END markers.)
   ===================================================================== */
/* PURE_CORE_START */

// Single source of truth for all balance/layout constants (GDD §9.1).
const CONFIG = {
  saveVersion: 1,
  // Biome mix is quantile-driven (see MapGen.generate): these are *target
  // fractions* of the board, so the map stays varied for any seed.
  map: {
    radius: 14, hexSize: 24, edgeFalloff: 0.55,
    frac: { water: 0.30, mountains: 0.07, hills: 0.11,     // of whole board / elevation bands
            forest: 0.28, fertile: 0.20, wasteland: 0.16 }, // of flat land / moisture bands
  },
  fog:    { castleReveal: 2, townReveal: 3 },
  camera: { minZoom: 0.32, maxZoom: 2.4, wheelStep: 1.12, panSpeed: 620 },
  econ:   { baseTickMs: 500 },
  terrain: {
    // buildable = a town marker / road may sit here (water needs a bridge, later)
    water:     { color: "#3f6079", buildable: false, road: false },
    meadow:    { color: "#8ba75a", buildable: true,  road: true  },
    forest:    { color: "#4d7738", buildable: true,  road: true  },
    hills:     { color: "#ac9560", buildable: true,  road: true  },
    mountains: { color: "#877f77", buildable: false, road: false },
    fertile:   { color: "#c2ad46", buildable: true,  road: true  },
    wasteland: { color: "#9c8b70", buildable: true,  road: true  },
  },
  fogColor: "#1b1710",
};

// Seeded PRNG — mulberry32 (GDD §9.1: MapGen uses mulberry32).
function mulberry32(a) {
  return function () {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// Turn any string seed into a 32-bit integer (so seeds can be words).
function hashSeed(str) {
  str = String(str);
  let h = 2166136261 >>> 0;
  for (let i = 0; i < str.length; i++) {
    h ^= str.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return h >>> 0;
}

// Pointy-top axial hex math (GDD §3.1, §9.1).
const HexMath = {
  DIRS: [[1, 0], [1, -1], [0, -1], [-1, 0], [-1, 1], [0, 1]],
  key(q, r) { return q + "," + r; },
  hexToPixel(q, r, size) {
    return { x: size * Math.sqrt(3) * (q + r / 2), y: size * 1.5 * r };
  },
  pixelToHex(x, y, size) {
    const q = (Math.sqrt(3) / 3 * x - 1 / 3 * y) / size;
    const r = (2 / 3 * y) / size;
    return HexMath.hexRound(q, r);
  },
  hexRound(q, r) {
    const s = -q - r;
    let rq = Math.round(q), rr = Math.round(r), rs = Math.round(s);
    const dq = Math.abs(rq - q), dr = Math.abs(rr - r), ds = Math.abs(rs - s);
    if (dq > dr && dq > ds) rq = -rr - rs;
    else if (dr > ds) rr = -rq - rs;
    return { q: rq, r: rr };
  },
  neighbors(q, r) {
    return HexMath.DIRS.map(d => ({ q: q + d[0], r: r + d[1] }));
  },
  dist(aq, ar, bq, br) {
    return (Math.abs(aq - bq) + Math.abs(ar - br) + Math.abs(aq + ar - bq - br)) / 2;
  },
  // All hexes within distance n of (cq,cr).
  range(cq, cr, n) {
    const out = [];
    for (let dq = -n; dq <= n; dq++) {
      const lo = Math.max(-n, -dq - n), hi = Math.min(n, -dq + n);
      for (let dr = lo; dr <= hi; dr++) out.push({ q: cq + dq, r: cr + dr });
    }
    return out;
  },
};

// Value-noise field with fractal Brownian motion (GDD §9.1: noise → biomes).
function makeValueNoise(seed) {
  function hash(ix, iy) {
    let h = (Math.imul(ix | 0, 374761393) + Math.imul(iy | 0, 668265263)) ^ seed;
    h = Math.imul(h ^ (h >>> 13), 1274126177);
    h ^= h >>> 16;
    return (h >>> 0) / 4294967296;
  }
  const smooth = t => t * t * (3 - 2 * t);
  function noise2(x, y) {
    const x0 = Math.floor(x), y0 = Math.floor(y);
    const sx = smooth(x - x0), sy = smooth(y - y0);
    const n00 = hash(x0, y0), n10 = hash(x0 + 1, y0);
    const n01 = hash(x0, y0 + 1), n11 = hash(x0 + 1, y0 + 1);
    const ix0 = n00 + (n10 - n00) * sx;
    const ix1 = n01 + (n11 - n01) * sx;
    return ix0 + (ix1 - ix0) * sy;
  }
  return function fbm(x, y, octaves) {
    octaves = octaves || 4;
    let amp = 1, freq = 1, sum = 0, norm = 0;
    for (let o = 0; o < octaves; o++) {
      sum += amp * noise2(x * freq, y * freq);
      norm += amp; amp *= 0.5; freq *= 2;
    }
    return sum / norm;
  };
}

// Deterministic seeded map generation (GDD §3).
const MapGen = {
  // Value at fraction f (0..1) through a sorted ascending array.
  quantile(sortedAsc, f) {
    if (sortedAsc.length === 0) return 0;
    const i = Math.min(sortedAsc.length - 1, Math.max(0, Math.round(f * (sortedAsc.length - 1))));
    return sortedAsc[i];
  },
  // Returns { seed, radius, hexes: Map<key, hex> }.
  // Two passes: (1) sample raw elevation+moisture noise per hex; (2) pick
  // biome thresholds by quantile so the terrain mix matches CONFIG.map.frac
  // for any seed (fixed cutoffs drift with the noise's mean; quantiles don't).
  generate(seedInput, radius) {
    radius = radius || CONFIG.map.radius;
    const F = CONFIG.map.frac;
    const seed = hashSeed(seedInput);
    const elevN = makeValueNoise(seed);
    const moistN = makeValueNoise(seed ^ 0x9e3779b9);

    // ---- pass 1: sample fields ----
    const hexes = new Map();
    for (let q = -radius; q <= radius; q++) {
      const lo = Math.max(-radius, -q - radius), hi = Math.min(radius, -q + radius);
      for (let r = lo; r <= hi; r++) {
        const d = HexMath.dist(0, 0, q, r) / radius;     // 0 centre → 1 rim
        const falloff = d * d * CONFIG.map.edgeFalloff;  // island bias: rim sinks
        const elev = elevN(q * 0.11 + 100, r * 0.11 + 100, 4) - falloff;
        const moist = moistN(q * 0.13 + 40, r * 0.13 + 40, 4);
        hexes.set(HexMath.key(q, r), { q, r, terrain: null, elevation: elev, moisture: moist, revealed: false });
      }
    }
    const all = Array.from(hexes.values());

    // ---- pass 2: quantile thresholds → biomes ----
    const elevs = all.map(h => h.elevation).sort((a, b) => a - b);
    const seaT  = MapGen.quantile(elevs, F.water);
    // elevation bands are measured over LAND only (above sea)
    const landElevs = elevs.filter(e => e >= seaT);
    const mtnT  = MapGen.quantile(landElevs, 1 - F.mountains);
    const hillT = MapGen.quantile(landElevs, 1 - F.mountains - F.hills);

    // moisture bands are measured over FLAT land (not hill/mountain)
    const flatMoist = all
      .filter(h => h.elevation >= seaT && h.elevation < hillT)
      .map(h => h.moisture).sort((a, b) => a - b);
    const forestT = MapGen.quantile(flatMoist, 1 - F.forest);
    const fertT   = MapGen.quantile(flatMoist, 1 - F.forest - F.fertile);
    const wasteT  = MapGen.quantile(flatMoist, F.wasteland);

    for (const h of all) {
      if (h.elevation < seaT)       h.terrain = "water";
      else if (h.elevation >= mtnT) h.terrain = "mountains";
      else if (h.elevation >= hillT) h.terrain = "hills";
      else if (h.moisture >= forestT) h.terrain = "forest";
      else if (h.moisture >= fertT)   h.terrain = "fertile";
      else if (h.moisture <  wasteT)  h.terrain = "wasteland";
      else                            h.terrain = "meadow";
    }

    // The castle hub sits at map centre and must be buildable ground (GDD §3.3).
    const c = hexes.get(HexMath.key(0, 0));
    if (c && !CONFIG.terrain[c.terrain].buildable) { c.terrain = "meadow"; }
    return { seed, radius, hexes };
  },
};

// === GOODS-PRICES START ===  (T5 / slot #3 — goods + buildings catalog + local price model)
// Pure data + pure functions only (GDD §5, §6.1). No DOM, no canvas, no I/O.
// Added to the shared CONFIG via a NON-DESTRUCTIVE merge so it composes with
// the Phase-1 CONFIG and with the other Phase-2 slices (T4 sim, T6 UI).
Object.assign(CONFIG, {
  // 14 goods across 3 tiers (GDD §5.1). basePrice climbs with tier; `inputs`
  // (goodId → qty consumed per unit produced) reference other goods by id.
  // NB: "beer = grain + water" in the GDD — water is ambient, not a tracked
  // good, so only grain appears here.
  goods: {
    // --- tier 1 (raw) ---
    wood:   { id: "wood",   tier: 1, basePrice: 5 },
    stone:  { id: "stone",  tier: 1, basePrice: 6 },
    ore:    { id: "ore",    tier: 1, basePrice: 8 },
    grain:  { id: "grain",  tier: 1, basePrice: 4 },
    fish:   { id: "fish",   tier: 1, basePrice: 5 },
    wool:   { id: "wool",   tier: 1, basePrice: 7 },
    // --- tier 2 (processed) ---
    planks: { id: "planks", tier: 2, basePrice: 12, inputs: { wood: 2 } },
    tools:  { id: "tools",  tier: 2, basePrice: 20, inputs: { ore: 1, wood: 1 } },
    flour:  { id: "flour",  tier: 2, basePrice: 10, inputs: { grain: 2 } },
    beer:   { id: "beer",   tier: 2, basePrice: 14, inputs: { grain: 2 } },
    cloth:  { id: "cloth",  tier: 2, basePrice: 16, inputs: { wool: 2 } },
    // --- tier 3 (luxury) ---
    bread:     { id: "bread",     tier: 3, basePrice: 22, inputs: { flour: 2 } },
    clothes:   { id: "clothes",   tier: 3, basePrice: 36, inputs: { cloth: 2 } },
    jewelry:   { id: "jewelry",   tier: 3, basePrice: 60, inputs: { ore: 3 } },
    furniture: { id: "furniture", tier: 3, basePrice: 44, inputs: { planks: 2, tools: 1 } },
  },

  // Tier 1–2 production buildings (GDD §5.2). Each:
  //   { id, terrain?, adjacent?, inputs?, output:{goodId, ratePerWorker},
  //     workerSlots, cost }
  // `terrain` = the resource hex this must sit on (omit for processors that run

    if (!town.pop) town.pop = { peasants: 0, workers: 0, burghers: 0 };
    const stock = town.stock;
    const pop = town.pop;
    const demand = {};                 // rebuilt every tick (drives Sim.priceFor)
    const addDemand = (g, amt) => { if (amt > 0) demand[g] = (demand[g] || 0) + amt; };

    // Work efficiency from the PREVIOUS tick's happiness (default 100 => 1.2x).
    const h = (typeof town.happiness === "number") ? town.happiness : 100;
    const hf = N.effMin + (Math.min(100, Math.max(0, h)) / 100) * (N.effMax - N.effMin);

    // --- 1. Production -------------------------------------------------
    // Each staffed building outputs ratePerWorker × effectiveWorkers × happiness,
    // consuming its per-worker inputs; throughput is throttled by missing inputs
    // and the available labour pool (workerSlots is the per-building cap).
    let labor = (pop.peasants || 0) + (pop.workers || 0) + (pop.burghers || 0);
    const buildings = town.buildings || [];
    for (const b of buildings) {
      const type = CONFIG.buildings[b.typeId];
      if (!type || !type.output) continue;
      const w = Math.min(b.workers || 0, type.workerSlots || 0, labor);
      if (w <= 0) continue;
      // Inputs cap effective workers; record full desired input as demand.
      let effW = w;
      const inputs = type.inputs;

      if (effW <= 0) continue;          // inputs missing → building idles this tick
      labor -= w;
      if (inputs) for (const gid in inputs) stock[gid] = clamp0((stock[gid] || 0) - inputs[gid] * effW);

    for (const gid in CONFIG.goods) Sim.priceFor(town, gid);

// === SIM-CORE END ===

// === PATHING START ===
// Pure Dijkstra pathfinder over the road-node graph (GDD §9.1). No DOM/canvas,
// no Math.random. Nodes are road hex keys in state.roads PLUS the two town
// access hexes for a query; edges join adjacent nodes (HexMath.neighbors,
// uniform step cost 1 for dirt roads). A town at (q,r) joins the network if its
// own hex or a neighbour hex is a road, so route() implicitly adds the two
// endpoints and connects them to any road-adjacent hop. Routes are memoized and
// invalidated by Pathing.invalidate(), which the browser layer calls at every
// state.roads mutation so a stale route never survives a road change.

    const i = k.indexOf(",");
    return { q: parseInt(k.slice(0, i), 10), r: parseInt(k.slice(i + 1), 10) };
  }

  // Neighbour node keys of `key` within the graph. A hex is a graph node if it
  // is a road OR one of the two query endpoints. Endpoints connect to adjacent
  // road hexes (and directly to each other if adjacent), which realizes the
  // "town hex or a neighbour hex is a road" connection rule.
  function neighborNodes(key, roads, fromKey, toKey) {
    const { q, r } = parseKey(key);
    const out = [];
    for (const n of HexMath.neighbors(q, r)) {
      const nk = HexMath.key(n.q, n.r);
      if (roads.has(nk) || nk === fromKey || nk === toKey) out.push(nk);
    }
    return out;
  }

    let result = null;

    if (fromKey === toKey) {
      result = { path: [fromKey], cost: 0 };
    } else {
      const dist = new Map([[fromKey, 0]]);
      const prev = new Map();
      const visited = new Set();
      // Frontier scan (boards are small: hundreds of hexes). Picks the
      // unvisited node of least tentative distance each step.
      const frontier = new Map([[fromKey, 0]]);
      while (frontier.size) {
        let cur = null, curD = Infinity;
        for (const [k, d] of frontier) if (d < curD) { curD = d; cur = k; }
        frontier.delete(cur);
        if (visited.has(cur)) continue;
        visited.add(cur);
        if (cur === toKey) break;
        for (const nk of neighborNodes(cur, roads, fromKey, toKey)) {
          if (visited.has(nk)) continue;
          const nd = curD + 1;
          if (nd < (dist.has(nk) ? dist.get(nk) : Infinity)) {
            dist.set(nk, nd);
            prev.set(nk, cur);
            frontier.set(nk, nd);
          }

        const path = [];
        let cur = toKey;
        while (cur !== undefined) { path.push(cur); cur = prev.get(cur); }
        path.reverse();
        result = { path, cost: dist.get(toKey) };
      }

    cache.set(ck, result);

  };

// === PATHING END ===

// === TRADE START ===  (T8 / slot #3 — cart dispatch + transactions + tariff)
// Pure, deterministic trade layer (GDD §6.2–6.3). No DOM / canvas / I/O and NO
// Math.random — every cart-route decision draws from a seeded stream stored on
// State (state.tradeSeed), so the whole sim+trade step is reproducible and safe
// to fast-forward / autoplay. Wired into the 500ms accumulator right AFTER
// Sim.tick(state). It only READS prices (Sim.tick already republished them via
// Sim.priceFor) and mutates only town.stock / town.gold, state.carts and
// state.treasury (the player's tariff income). Mitigates the GDD §10 risk of

    tariffRate: 0.25,          // 25% of every inter-town transaction → treasury (GDD §6.3)

      terrainCanvas.width = w; terrainCanvas.height = h;
    }
    terrainOrigin = { x: b.minX, y: b.minY };
    const g = terrainCtx;
    g.clearRect(0, 0, w, h);

    for (const hex of state.map.hexes.values()) {
      const p = HexMath.hexToPixel(hex.q, hex.r, SIZE);
      const cx = p.x - terrainOrigin.x, cy = p.y - terrainOrigin.y;
      const visible = isVisible(HexMath.key(hex.q, hex.r));
      const pts = hexCorners(cx, cy);
      g.beginPath();
      g.moveTo(pts[0][0], pts[0][1]);
      for (let i = 1; i < 6; i++) g.lineTo(pts[i][0], pts[i][1]);
      g.closePath();

      if (visible) {
        g.fillStyle = CONFIG.terrain[hex.terrain].color;
        g.fill();
        g.lineWidth = 1;
        g.strokeStyle = "rgba(30,22,12,0.28)";
        g.stroke();
      } else {
        g.fillStyle = CONFIG.fogColor;
        g.fill();
        g.lineWidth = 1;
        g.strokeStyle = "rgba(255,255,255,0.03)";
        g.stroke();
      }
    }
    terrainDirty = false;
  }

  // ---------------------------------------------------------------
  // Coordinate transforms (world <-> screen)
  // ---------------------------------------------------------------
  function screenToWorld(sx, sy) {
    return {
      x: (sx - canvas.clientWidth / 2) / state.zoom + state.cam.x,
      y: (sy - canvas.clientHeight / 2) / state.zoom + state.cam.y,
    };
  }
  function hexAtScreen(sx, sy) {
    const w = screenToWorld(sx, sy);
    return HexMath.pixelToHex(w.x, w.y, SIZE);
  }

  // ---------------------------------------------------------------
  // Main render
  // ---------------------------------------------------------------
  let hoverHex = null;

  function drawRoads() {
    if (state.roads.size === 0) return;
    ctx.lineCap = "round";
    ctx.lineWidth = 5;
    ctx.strokeStyle = "#5a4326";
    // connect adjacent road hexes (draw each undirected edge once)
    for (const k of state.roads) {
      const [q, r] = k.split(",").map(Number);
      const p = HexMath.hexToPixel(q, r, SIZE);
      for (const n of HexMath.neighbors(q, r)) {
        const nk = HexMath.key(n.q, n.r);
        if (state.roads.has(nk) && nk > k) {
          const np = HexMath.hexToPixel(n.q, n.r, SIZE);
          ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(np.x, np.y); ctx.stroke();
        }
      }
    }
    // node dots
    ctx.fillStyle = "#6b5230";
    for (const k of state.roads) {
      const [q, r] = k.split(",").map(Number);
      const p = HexMath.hexToPixel(q, r, SIZE);
      ctx.beginPath(); ctx.arc(p.x, p.y, 3.5, 0, Math.PI * 2); ctx.fill();
    }
  }

  function drawTowns() {
    for (const t of state.towns) {
      const p = HexMath.hexToPixel(t.q, t.r, SIZE);
      // shadow
      ctx.fillStyle = "rgba(0,0,0,0.35)";
      ctx.beginPath(); ctx.ellipse(p.x, p.y + SIZE * 0.5, SIZE * 0.55, SIZE * 0.22, 0, 0, Math.PI * 2); ctx.fill();
      // token
      ctx.fillStyle = "#d9b26b";
      ctx.strokeStyle = "#7a5a2c"; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(p.x, p.y, SIZE * 0.5, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
      // little house glyph
      ctx.fillStyle = "#7a5a2c";
      const s = SIZE * 0.28;
      ctx.beginPath();
      ctx.moveTo(p.x, p.y - s);
      ctx.lineTo(p.x + s, p.y);
      ctx.lineTo(p.x - s, p.y);
      ctx.closePath(); ctx.fill();
      ctx.fillRect(p.x - s * 0.7, p.y, s * 1.4, s * 0.9);
    }
  }

  function drawCastle() {
    const p = HexMath.hexToPixel(0, 0, SIZE);
    ctx.fillStyle = "rgba(0,0,0,0.4)";
    ctx.beginPath(); ctx.ellipse(p.x, p.y + SIZE * 0.55, SIZE * 0.7, SIZE * 0.28, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#c98a3c";
    ctx.strokeStyle = "#5a3d16"; ctx.lineWidth = 2.5;
    const w = SIZE * 0.9, hh = SIZE * 0.7;
    ctx.beginPath(); ctx.rect(p.x - w / 2, p.y - hh / 2, w, hh); ctx.fill(); ctx.stroke();
    // crenellations
    ctx.fillStyle = "#c98a3c";
    const cw = w / 5;
    for (let i = 0; i < 3; i++) {
      ctx.fillRect(p.x - w / 2 + i * 2 * cw, p.y - hh / 2 - cw, cw, cw);
    }
    // flag
    ctx.strokeStyle = "#5a3d16"; ctx.beginPath();
    ctx.moveTo(p.x, p.y - hh / 2 - cw); ctx.lineTo(p.x, p.y - hh / 2 - cw - SIZE * 0.5); ctx.stroke();
    ctx.fillStyle = "#e0553f";
    ctx.beginPath();
    ctx.moveTo(p.x, p.y - hh / 2 - cw - SIZE * 0.5);
    ctx.lineTo(p.x + SIZE * 0.35, p.y - hh / 2 - cw - SIZE * 0.38);
    ctx.lineTo(p.x, p.y - hh / 2 - cw - SIZE * 0.26);
    ctx.closePath(); ctx.fill();
  }

  function drawHoverGhost() {
    if (!hoverHex || state.mode === "pan") return;
    const k = HexMath.key(hoverHex.q, hoverHex.r);
    const hex = state.map.hexes.get(k);
    if (!hex || !isVisible(k)) return;
    const p = HexMath.hexToPixel(hoverHex.q, hoverHex.r, SIZE);
    const pts = hexCorners(p.x, p.y);
    ctx.beginPath();
    ctx.moveTo(pts[0][0], pts[0][1]);
    for (let i = 1; i < 6; i++) ctx.lineTo(pts[i][0], pts[i][1]);
    ctx.closePath();
    const ok = canPlace(hoverHex.q, hoverHex.r);
    ctx.fillStyle = ok ? "rgba(230,200,120,0.35)" : "rgba(224,80,60,0.30)";
    ctx.fill();
    ctx.lineWidth = 2;
    ctx.strokeStyle = ok ? "#f0d590" : "#e0503c";
    ctx.stroke();
  }

  // ---------------------------------------------------------------
  // Build actions
  // ---------------------------------------------------------------
  function canPlace(q, r) {
    const k = HexMath.key(q, r);
    const hex = state.map.hexes.get(k);
    if (!hex || !isVisible(k)) return false;
    if (state.mode === "road") {
      if (!CONFIG.terrain[hex.terrain].road) return false;
      if (state.roads.has(k)) return false;
      return true;
    }
    if (state.mode === "town") {
      if (!CONFIG.terrain[hex.terrain].buildable) return false;
      if (q === 0 && r === 0) return false;                       // castle sits here
      if (state.towns.some(t => t.q === q && t.r === r)) return false;
      if (state.roads.has(k)) return false;
      return true;
    }
    if (state.mode === "erase") {
      return state.roads.has(k) || state.towns.some(t => t.q === q && t.r === r);
    }
    return false;
  }

  function place(q, r) {
    const k = HexMath.key(q, r);
    if (state.mode === "road") {
      if (canPlace(q, r)) { state.roads.add(k); Pathing.invalidate(); scheduleSave(); }
    } else if (state.mode === "town") {
      if (canPlace(q, r)) {
        state.towns.push(makeTown(q, r));   // TOWN-UI: full Town entity (was { q, r })
        reveal(q, r, CONFIG.fog.townReveal);
        scheduleSave();
      }
    } else if (state.mode === "erase") {
      let changed = false;
      if (state.roads.delete(k)) { Pathing.invalidate(); changed = true; }
      const ti = state.towns.findIndex(t => t.q === q && t.r === r);
      if (ti >= 0) { state.towns.splice(ti, 1); changed = true; }
      if (changed) scheduleSave();
    }
  }

  // ---------------------------------------------------------------
  // Input: pan (drag / WASD), zoom (wheel), build (click / paint)
  // ---------------------------------------------------------------
  const keys = new Set();
  let dragging = false, dragPanned = false, panButton = false;
  let last = { x: 0, y: 0 };
  let lastPaintKey = null;

  function isPanGesture(e) {
    // right / middle button, or left button in pan mode
    return e.button === 1 || e.button === 2 || (e.button === 0 && state.mode === "pan");
  }

  canvas.addEventListener("mousedown", (e) => {
    canvas.focus();
    dragging = true; dragPanned = false;
    panButton = isPanGesture(e);
    last = { x: e.clientX, y: e.clientY };
    if (!panButton && e.button === 0) {
      const h = hexAtScreen(e.clientX, e.clientY);
      lastPaintKey = HexMath.key(h.q, h.r);
      place(h.q, h.r);
    }
    if (panButton) canvas.classList.add("panning");
  });

  window.addEventListener("mousemove", (e) => {
    const h = hexAtScreen(e.clientX, e.clientY);
    hoverHex = h;
    if (!dragging) return;
    const dx = e.clientX - last.x, dy = e.clientY - last.y;
    if (Math.abs(dx) + Math.abs(dy) > 2) dragPanned = true;
    last = { x: e.clientX, y: e.clientY };
    if (panButton) {
      state.cam.x -= dx / state.zoom;
      state.cam.y -= dy / state.zoom;
    } else if (state.mode === "road" || state.mode === "erase") {
      const k = HexMath.key(h.q, h.r);
      if (k !== lastPaintKey) { lastPaintKey = k; place(h.q, h.r); }
    }
  });

  window.addEventListener("mouseup", () => {
    dragging = false; panButton = false; lastPaintKey = null;
    canvas.classList.remove("panning");
    scheduleSave();
  });

  canvas.addEventListener("contextmenu", e => e.preventDefault());

  canvas.addEventListener("wheel", (e) => {
    e.preventDefault();
    const before = screenToWorld(e.clientX, e.clientY);
    const factor = e.deltaY < 0 ? CONFIG.camera.wheelStep : 1 / CONFIG.camera.wheelStep;
    state.zoom = Math.min(CONFIG.camera.maxZoom, Math.max(CONFIG.camera.minZoom, state.zoom * factor));
    const after = screenToWorld(e.clientX, e.clientY);
    // keep the point under the cursor fixed while zooming
    state.cam.x += before.x - after.x;
    state.cam.y += before.y - after.y;
    scheduleSave();
  }, { passive: false });

  window.addEventListener("keydown", (e) => {
    const k = e.key.toLowerCase();
    if (["w", "a", "s", "d"].includes(k)) keys.add(k);
    if (e.target && e.target.id === "seed") return;
    if (k === "1") setMode("pan");
    if (k === "2") setMode("road");
    if (k === "3") setMode("town");
    if (k === "4") setMode("erase");
  });
  window.addEventListener("keyup", (e) => keys.delete(e.key.toLowerCase()));

  function applyKeyPan(dt) {
    const v = CONFIG.camera.panSpeed / state.zoom * (dt / 1000);
    if (keys.has("w")) state.cam.y -= v;
    if (keys.has("s")) state.cam.y += v;
    if (keys.has("a")) state.cam.x -= v;
    if (keys.has("d")) state.cam.x += v;
  }

  // ---------------------------------------------------------------
  // Toolbar / UI wiring
  // ---------------------------------------------------------------
  const toolButtons = Array.from(document.querySelectorAll("button.tool"));
  function setMode(mode) {
    state.mode = mode;
    toolButtons.forEach(b => b.classList.toggle("active", b.dataset.mode === mode));
    canvas.classList.toggle("building", mode !== "pan");
  }
  toolButtons.forEach(b => b.addEventListener("click", () => setMode(b.dataset.mode)));

  document.getElementById("btnGen").addEventListener("click", () => {
    newGame(document.getElementById("seed").value.trim() || randomSeed());
  });
  document.getElementById("btnRandom").addEventListener("click", () => {
    const s = randomSeed();
    document.getElementById("seed").value = s;
    newGame(s);
  });
  document.getElementById("btnReveal").addEventListener("click", () => {
    state.revealAll = !state.revealAll;
    terrainDirty = true;
  });
  document.getElementById("btnCenter").addEventListener("click", () => {
    state.cam.x = 0; state.cam.y = 0;
  });

  function randomSeed() {
    // avoid Math.random dependency on a specific value; any string works as a seed
    const words = ["harbor", "amber", "clover", "willow", "ember", "cobble", "marsh", "birch", "flint", "haven"];
    const t = Date.now().toString(36);
    return words[t.charCodeAt(t.length - 1) % words.length] + "-" + t.slice(-4);
  }

  // ---------------------------------------------------------------
  // New game / reset
  // ---------------------------------------------------------------
  function newGame(seedInput) {
    state.seedInput = seedInput;
    state.map = MapGen.generate(seedInput, CONFIG.map.radius);
    state.roads = new Set();
    state.towns = [];
    state.carts = [];
    state.treasury = 0;
    state.tradeSeed = hashSeed(seedInput) ^ 0x5bd1e995;   // deterministic per-game trade RNG
    state.warehouse = {};        // CASTLE-UI (T9): reset player warehouse on new map
    state.revealed = new Set();
    state.cam = { x: 0, y: 0 };
    state.zoom = 1;
    document.getElementById("seed").value = seedInput;
    reveal(0, 0, CONFIG.fog.castleReveal);      // clear fog around the castle
    terrainDirty = true;
    scheduleSave();
  }

  // ---------------------------------------------------------------
  // Persistence (versioned; GDD §9.4)
  // ---------------------------------------------------------------
  let saveTimer = null;
  function scheduleSave() {
    if (saveTimer) return;
    saveTimer = setTimeout(() => { saveTimer = null; saveGame(); }, 800);
  }
  function saveGame() {
    try {
      const data = {
        saveVersion: CONFIG.saveVersion,
        seed: state.seedInput,
        cam: state.cam, zoom: state.zoom, mode: state.mode,
        revealAll: state.revealAll,
        roads: Array.from(state.roads),
        towns: state.towns,
        carts: state.carts,
        treasury: state.treasury,
        tradeSeed: state.tradeSeed,
        revealed: Array.from(state.revealed),
        warehouse: state.warehouse,        // CASTLE-UI (T9): player warehouse
      };
      localStorage.setItem(SAVE_KEY, JSON.stringify(data));
    } catch (err) { /* private mode / quota — ignore */ }
  }
  function migrate(data) {
    // Future save versions get upgraded here; v1 is the baseline.
    if (!data || typeof data !== "object") return null;
    if (data.saveVersion !== CONFIG.saveVersion) return null;
    return data;
  }
  function loadGame() {
    let data = null;
    try { data = JSON.parse(localStorage.getItem(SAVE_KEY)); } catch (e) {}
    data = migrate(data);
    if (!data) return false;
    newGame(data.seed);
    state.roads = new Set(data.roads || []);
    state.towns = data.towns || [];
    state.carts = Array.isArray(data.carts) ? data.carts : [];
    state.treasury = typeof data.treasury === "number" ? data.treasury : 0;
    if (typeof data.tradeSeed === "number") state.tradeSeed = data.tradeSeed;
    state.warehouse = data.warehouse || {};   // CASTLE-UI (T9)
    state.revealAll = !!data.revealAll;
    for (const k of (data.revealed || [])) {
      state.revealed.add(k);
      const hex = state.map.hexes.get(k);
      if (hex) hex.revealed = true;
    }
    state.cam = data.cam || { x: 0, y: 0 };
    state.zoom = data.zoom || 1;
    setMode(data.mode || "pan");
    terrainDirty = true;
    return true;
  }

  // autosave every 30s + on hide (GDD §9.4)
  setInterval(saveGame, 30000);
  document.addEventListener("visibilitychange", () => { if (document.hidden) saveGame(); });
  window.addEventListener("beforeunload", saveGame);

  // Economy tick: the pure cores defined above in PURE_CORE are used directly —
  // each 500ms step the loop below calls Sim.tick(state) (production/consumption/
  // prices) then Trade.tick(state) (cart dispatch + transactions + tariff). No
  // local stubs: the closure sees the top-level `Sim` / `Trade` namespaces.

  // ---------------------------------------------------------------
  // Canvas sizing
  // ---------------------------------------------------------------
  function resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = Math.floor(window.innerWidth * dpr);
    canvas.height = Math.floor(window.innerHeight * dpr);
    canvas.style.width = window.innerWidth + "px";
    canvas.style.height = window.innerHeight + "px";
    // The frame's drawWithDpr() folds DPR into its world transform each frame.
    DPR = dpr;
  }
  let DPR = 1;
  window.addEventListener("resize", resize);

  // ---------------------------------------------------------------
  // Two-clock main loop (GDD §9.2)
  //   render on rAF; economy on fixed 500ms * gameSpeed accumulator
  // ---------------------------------------------------------------
  let lastTime = performance.now();
  let econAcc = 0;
  let fpsSmoothed = 60, fpsTimer = 0, fpsFrames = 0;

  const fpsEl = document.getElementById("fps");
  const statEl = document.getElementById("stat");

  function frame(now) {
    const dt = Math.min(100, now - lastTime);
    lastTime = now;

    // economy clock — paused when tab hidden (GDD §9.2 default)
    if (state.gameSpeed > 0 && !document.hidden) {
      econAcc += dt * state.gameSpeed;
      const step = CONFIG.econ.baseTickMs;
      let guard = 0;
      while (econAcc >= step && guard++ < 8) { Sim.tick(state); Trade.tick(state); econAcc -= step; }
    }

    applyKeyPan(dt);
    drawWithDpr();

    // FPS meter
    fpsFrames++; fpsTimer += dt;
    if (fpsTimer >= 500) {
      fpsSmoothed = Math.round(fpsFrames * 1000 / fpsTimer);
      fpsFrames = 0; fpsTimer = 0;
      fpsEl.textContent = fpsSmoothed;
      fpsEl.className = "fps" + (fpsSmoothed < 50 ? " warn" : "");
      statEl.textContent =
        `${state.map.hexes.size} hexes · ${state.towns.length} towns · ${state.roads.size} roads · z${state.zoom.toFixed(2)}`;
    }
    requestAnimationFrame(frame);
  }

  // wraps draw() so the device-pixel-ratio scale is applied on top of the
  // world transform (draw() calls setTransform itself, so multiply DPR in)
  function drawWithDpr() {
    const W = window.innerWidth, H = window.innerHeight;
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    ctx.fillStyle = "#14110c";
    ctx.fillRect(0, 0, W, H);
    ctx.setTransform(
      state.zoom * DPR, 0, 0, state.zoom * DPR,
      (W / 2 - state.cam.x * state.zoom) * DPR,
      (H / 2 - state.cam.y * state.zoom) * DPR
    );
    if (terrainDirty) renderTerrain();
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(terrainCanvas, terrainOrigin.x, terrainOrigin.y);
    drawRoads();
    drawTowns();
    drawCarts();      // CARTS (T9): live trade carts, drawn right after towns
    drawCastle();
    drawHoverGhost();
  }

  // === TOWN-UI START ===  (T6 / slot #4 — town entities + town panel UI, DOM)
  // Builds real Town entities (contract shape) and an HTML panel layered over the
  // canvas. Consumes the pure-core price model via window.Sim.priceFor (the IIFE's
  // local `Sim` above is a no-op stub that shadows the pure namespace, so we reach
  // the real one through window). Does NOT implement Sim.tick — that's T4's slice.

  // Reach the pure-core Sim.priceFor (window.Sim), tolerating either load order.
  function priceOf(town, goodId) {
    const S = (typeof window !== "undefined" && window.Sim) || null;
    if (S && typeof S.priceFor === "function") return S.priceFor(town, goodId);
    const g = CONFIG.goods[goodId];
    return g ? g.basePrice : 0;            // graceful fallback if priceFor absent
  }

  // Max town-center attached buildings by level (GDD §4.1: 3/5/7/9).
  const TOWN_BUILDING_CAP = { 1: 3, 2: 5, 3: 7, 4: 9 };

  function nextTownId() {
    let max = 0;
    for (const t of state.towns) { const n = +t.id; if (Number.isFinite(n) && n > max) max = n; }
    return max + 1;
  }

  function terrainAt(q, r) {
    const h = state.map && state.map.hexes.get(HexMath.key(q, r));
    return h ? h.terrain : null;
  }
  function hexHasNeighborTerrain(q, r, terr) {
    return HexMath.neighbors(q, r).some(n => terrainAt(n.q, n.r) === terr);
  }

  // Attach a couple of starter buildings within radius 1–2 (GDD §4.1) so the
  // Buildings tab has data. Terrain buildings snap to a matching resource hex;
  // processors (no `terrain`) sit on any buildable town hex.
  function seedBuildings(town) {
    const cap = TOWN_BUILDING_CAP[town.level] || 3;
    const out = [];
    const ring = HexMath.range(town.q, town.r, 2)
      .filter(h => !(h.q === town.q && h.r === town.r) && state.map.hexes.has(HexMath.key(h.q, h.r)));
    const used = new Set();
    const takeHex = (pred) => {
      for (const h of ring) {
        const k = HexMath.key(h.q, h.r);
        if (used.has(k)) continue;
        if (pred(h)) { used.add(k); return h; }
      }
      return null;
    };
    for (const def of Object.values(CONFIG.buildings)) {
      if (out.length >= cap) break;
      let hex = null;
      if (def.terrain) {
        hex = takeHex(h => terrainAt(h.q, h.r) === def.terrain);
      } else if (def.adjacent) {
        hex = takeHex(h => CONFIG.terrain[terrainAt(h.q, h.r)] &&
                           CONFIG.terrain[terrainAt(h.q, h.r)].buildable &&
                           hexHasNeighborTerrain(h.q, h.r, def.adjacent));
      } else {
        // processor: any buildable hex in the ring
        hex = takeHex(h => { const tt = CONFIG.terrain[terrainAt(h.q, h.r)]; return tt && tt.buildable; });
      }
      if (hex) out.push({ typeId: def.id, q: hex.q, r: hex.r, workers: def.workerSlots });
    }
    return out;
  }

  // Create a Town matching the shared data contract exactly (TASKS.md):
  //   { id, q, r, level, gold, pop:{peasants,workers,burghers}, stock:{goodId:qty},
  //     prices:{goodId:price}, buildings:[{typeId,q,r,workers}], happiness }
  // Seeded with sensible starting values so the panel (and, later, Sim.tick) has
  // real data to show even before the economy tick lands.
  function makeTown(q, r) {
    const town = {
      id: nextTownId(),
      q, r,
      // Start at level 2 so towns maintain a cart and trade autonomously on
      // placement (Phase 3 core loop). Proper tariff-funded town leveling is
      // Phase 4 progression; until then new towns are trade-capable by default.
      level: 2,
      gold: 200,
      pop: { peasants: 20, workers: 8, burghers: 2 },
      stock: {
        wood: 40, stone: 24, ore: 10, grain: 34, fish: 16, wool: 12,
        planks: 10, tools: 5, flour: 14, beer: 8, cloth: 6,
        bread: 9, clothes: 2, jewelry: 0, furniture: 1,
      },
      prices: {},
      buildings: [],
      happiness: 78,
    };
    town.buildings = seedBuildings(town);
    // Prime prices once so the panel opens with meaningful numbers (priceFor
    // mutates town.prices; first read snaps to target).
    for (const id of Object.keys(CONFIG.goods)) priceOf(town, id);
    return town;
  }

  // Back-fill missing fields on any town (e.g. a bare {q,r} marker from a Phase-1
  // save) so the panel never trips over undefined state.
  function ensureTown(t) {
    if (t.id == null) t.id = nextTownId();
    if (t.level == null) t.level = 1;
    if (t.gold == null) t.gold = 200;
    if (!t.pop) t.pop = { peasants: 20, workers: 8, burghers: 2 };
    if (!t.stock) t.stock = {};
    if (!t.prices) t.prices = {};
    if (!Array.isArray(t.buildings)) t.buildings = seedBuildings(t);
    if (t.happiness == null) t.happiness = 78;
    return t;
  }

  // ---- panel DOM + state ----
  const panelEl = document.getElementById("townPanel");
  const tpNameEl = document.getElementById("tpName");
  const tpLevelEl = document.getElementById("tpLevel");
  const tpBodyEl = document.getElementById("tpBody");
  const tpTabEls = Array.from(panelEl.querySelectorAll(".tp-tab"));

  let activeTown = null;
  let activeTab = "overview";
  const trendPrev = {};          // key "townId:goodId" -> last displayed price (trend arrows)

  const GOOD_LABEL = id => id.charAt(0).toUpperCase() + id.slice(1);
  const fmt = n => (Math.round(n * 10) / 10).toLocaleString();

  function trendArrow(town, goodId, price) {
    const key = town.id + ":" + goodId;
    const prev = trendPrev[key];
    trendPrev[key] = price;
    if (prev === undefined || Math.abs(price - prev) < 0.05) return '<span class="trend flat">▬</span>';
    return price > prev ? '<span class="trend up">▲</span>' : '<span class="trend down">▼</span>';
  }

  function esc(s) { return String(s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c])); }

  function renderOverview(t) {
    const popTotal = t.pop.peasants + t.pop.workers + t.pop.burghers;
    const happy = Math.round(t.happiness);
    const goodsHeld = Object.values(t.stock).filter(v => v > 0).length;
    return `
      <div class="tp-sec">Summary</div>
      <div class="tp-row"><span class="k">Treasury</span><span class="v">${fmt(t.gold)} g</span></div>
      <div class="tp-row"><span class="k">Population</span><span class="v">${popTotal}</span></div>
      <div class="tp-row"><span class="k">Buildings</span><span class="v">${t.buildings.length} / ${TOWN_BUILDING_CAP[t.level] || 3}</span></div>
      <div class="tp-row"><span class="k">Goods in stock</span><span class="v">${goodsHeld} / ${Object.keys(CONFIG.goods).length}</span></div>
      <div class="tp-sec">Happiness — ${happy}%</div>
      <div class="tp-bar"><span style="width:${Math.max(0, Math.min(100, happy))}%"></span></div>
      <div class="tp-row"><span class="k">Location</span><span class="v">q ${t.q}, r ${t.r}</span></div>`;
  }

  function renderStock(t) {
    const ids = Object.keys(CONFIG.goods).sort((a, b) =>
      CONFIG.goods[a].tier - CONFIG.goods[b].tier || a.localeCompare(b));
    let rows = "";
    for (const id of ids) {
      const qty = t.stock[id] || 0;
      const price = priceOf(t, id);
      const arrow = trendArrow(t, id, price);
      rows += `<tr class="${qty > 0 ? "" : "dim"}">
        <td>${esc(GOOD_LABEL(id))}<span style="opacity:.5"> · T${CONFIG.goods[id].tier}</span></td>
        <td>${fmt(qty)}</td>
        <td>${fmt(price)}g ${arrow}</td></tr>`;
    }
    return `<table class="tp-tbl">
      <tr><th>Good</th><th>Stock</th><th>Price</th></tr>${rows}</table>`;
  }

  function renderBuildings(t) {
    if (!t.buildings.length) return `<div class="tp-empty">No production buildings yet.</div>`;
    let rows = "";
    for (const b of t.buildings) {
      const def = CONFIG.buildings[b.typeId] || {};
      const out = def.output ? `${GOOD_LABEL(def.output.goodId)} ×${def.output.ratePerWorker}/wkr` : "—";
      const slots = def.workerSlots != null ? def.workerSlots : "?";
      rows += `<tr>
        <td>${esc(GOOD_LABEL(b.typeId))}</td>
        <td>${esc(out)}</td>
        <td>${b.workers}/${slots}</td>
        <td>${b.q},${b.r}</td></tr>`;
    }
    return `<table class="tp-tbl">
      <tr><th>Building</th><th>Output</th><th>Wkr</th><th>Hex</th></tr>${rows}</table>`;
  }

  function renderPopulation(t) {
    const tiers = [
      { key: "peasants", label: "Peasants", needs: "food" },
      { key: "workers",  label: "Workers",  needs: "food + beer" },
      { key: "burghers", label: "Burghers", needs: "food + beer + clothes" },
    ];
    let rows = "";
    for (const tier of tiers) {
      rows += `<div class="tp-row"><span class="k">${tier.label}<span style="opacity:.5"> · needs ${tier.needs}</span></span><span class="v">${t.pop[tier.key] || 0}</span></div>`;
    }
    const total = t.pop.peasants + t.pop.workers + t.pop.burghers;
    return `<div class="tp-sec">By tier — ${total} total</div>${rows}
      <div class="tp-sec">Happiness — ${Math.round(t.happiness)}%</div>
      <div class="tp-bar"><span style="width:${Math.max(0, Math.min(100, t.happiness))}%"></span></div>`;
  }

  function renderTownPanel() {
    if (!activeTown) return;
    // panel outlived its town (erased)? close.
    if (!state.towns.includes(activeTown)) { closeTownPanel(); return; }
    const t = activeTown;
    tpNameEl.textContent = "Town #" + t.id;
    tpLevelEl.textContent = "Lv " + t.level;
    let html = "";
    if (activeTab === "overview") html = renderOverview(t);
    else if (activeTab === "stock") html = renderStock(t);
    else if (activeTab === "buildings") html = renderBuildings(t);
    else if (activeTab === "population") html = renderPopulation(t);
    tpBodyEl.innerHTML = html;
  }

  function openTownPanel(town) {
    activeTown = ensureTown(town);
    panelEl.classList.remove("hidden");
    panelEl.setAttribute("aria-hidden", "false");
    renderTownPanel();
  }
  function closeTownPanel() {
    activeTown = null;
    panelEl.classList.add("hidden");
    panelEl.setAttribute("aria-hidden", "true");
  }

  tpTabEls.forEach(btn => btn.addEventListener("click", () => {
    activeTab = btn.dataset.tab;
    tpTabEls.forEach(b => b.classList.toggle("active", b === btn));
    renderTownPanel();
  }));
  document.getElementById("tpClose").addEventListener("click", closeTownPanel);

  // Town-click detection: a non-drag left click on a town center opens the panel.
  // We track our own down-position so a camera drag (which still fires a `click`)
  // is not mistaken for a click. Only in pan mode, so build/erase keep their own
  // click behaviour and panning is never blocked.
  let tuiDown = null;
  canvas.addEventListener("mousedown", (e) => { if (e.button === 0) tuiDown = { x: e.clientX, y: e.clientY }; });
  canvas.addEventListener("click", (e) => {
    const down = tuiDown; tuiDown = null;
    if (!down) return;
    if (Math.abs(e.clientX - down.x) + Math.abs(e.clientY - down.y) > 5) return; // a drag
    if (state.mode !== "pan") return;
    const h = hexAtScreen(e.clientX, e.clientY);
    const town = state.towns.find(t => t.q === h.q && t.r === h.r);
    if (town) openTownPanel(town); else if (activeTown) closeTownPanel();
  });

  // Live refresh: reflect stock/price/pop changes as the economy ticks (T4 later)
  // and keep prices lerping via priceFor even before Sim.tick exists.
  setInterval(() => { if (activeTown) renderTownPanel(); }, 500);

  // Expose for headless smoke test / console debugging.
  window.TownUI = { makeTown, ensureTown, openTownPanel, closeTownPanel,
                    get activeTown() { return activeTown; } };
  // === TOWN-UI END ===

  // === CARTS + CASTLE-UI START === (T9 / slot #4)
  // Reads the shared Phase-3 contract produced by T8 (state.carts, state.treasury,
  // CONFIG.trade) DEFENSIVELY — everything guarded so this slice also runs before
  // T8 merges. Owns ONLY the player warehouse (state.warehouse) + CONFIG.castle.
  // No trade logic here: carts are positioned purely from cart.progress.

  // My own config (additive; T8 owns CONFIG.trade, not touched here).
  CONFIG.castle = Object.assign({ warehouseCapacity: 300, tradeUnit: 5 }, CONFIG.castle);

  // Player warehouse — a flat { goodId: qty }. Owned by this slice.
  if (!state.warehouse || typeof state.warehouse !== "object") state.warehouse = {};

  // Per-good token colours for the cart dot (goods have no colour in CONFIG).
  const GOOD_COLORS = {
    wood: "#8a5a2b", planks: "#b07a3c", stone: "#9aa0a6", ore: "#6b7078",
    grain: "#d9b44a", flour: "#e8d59a", fish: "#5aa6c9", wool: "#e2ddce",
    bread: "#c8863c", beer: "#c9902c", cloth: "#7a9bd4", clothes: "#5566c0",
    tools: "#aab0b6", jewelry: "#e6c93f", furniture: "#a56a38",
  };
  function goodColor(id) {
    if (GOOD_COLORS[id]) return GOOD_COLORS[id];
    let h = 0; const s = String(id);
    for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0;
    return `hsl(${h % 360},55%,58%)`;
  }

  // ---- cart rendering ----------------------------------------------------
  // Position derives from cart.progress interpolated along the hex-key `path`.
  // I read the contract shape { path:[hexKey...], progress:0..1, phase, goodId,
  // done }. For 'return' I mirror the fraction (1-progress) so a cart that reset
  // progress to 0 on the way home walks the SAME path backwards — see integration
  // notes if T8 keeps progress running instead of resetting.
  function cartPixel(cart) {
    const path = cart && cart.path;
    if (!Array.isArray(path) || path.length === 0) return null;
    const pts = [];
    for (const k of path) {
      if (typeof k !== "string") return null;
      const [q, r] = k.split(",").map(Number);
      if (!Number.isFinite(q) || !Number.isFinite(r)) return null;
      pts.push(HexMath.hexToPixel(q, r, SIZE));
    }
    if (pts.length === 1) return pts[0];
    let f = Math.max(0, Math.min(1, Number(cart.progress) || 0));
    if (cart.phase === "return") f = 1 - f;
    // walk cumulative segment lengths to the fraction f of total length
    let total = 0; const seg = [];
    for (let i = 0; i < pts.length - 1; i++) {
      const l = Math.hypot(pts[i + 1].x - pts[i].x, pts[i + 1].y - pts[i].y);
      seg.push(l); total += l;
    }
    if (total === 0) return pts[0];
    let d = f * total;
    for (let i = 0; i < seg.length; i++) {
      if (d <= seg[i] || i === seg.length - 1) {
        const t = seg[i] ? d / seg[i] : 0;
        return { x: pts[i].x + (pts[i + 1].x - pts[i].x) * t,
                 y: pts[i].y + (pts[i + 1].y - pts[i].y) * t };
      }
      d -= seg[i];
    }
    return pts[pts.length - 1];
  }

  const cartRender = {};   // cart.id -> smoothed {x,y} for render-dt lerp

  function drawCartToken(x, y, color) {
    const w = SIZE * 0.52, h = SIZE * 0.34;
    ctx.fillStyle = "rgba(0,0,0,0.3)";
    ctx.beginPath(); ctx.ellipse(x, y + h * 0.62, w * 0.5, h * 0.24, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#6b4a22"; ctx.strokeStyle = "#3c2a12"; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.rect(x - w / 2, y - h / 2, w, h); ctx.fill(); ctx.stroke();
    ctx.fillStyle = "#2a1c0c";
    ctx.beginPath(); ctx.arc(x - w * 0.28, y + h * 0.5, h * 0.3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + w * 0.28, y + h * 0.5, h * 0.3, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = color; ctx.strokeStyle = "rgba(0,0,0,0.45)"; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(x, y - h * 0.08, h * 0.36, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  }

  function drawCarts() {
    const carts = state.carts || [];
    if (!carts.length) return;
    const zoomedOut = state.zoom < 0.6;   // dots-only when far out (GDD §8)
    const live = new Set();
    for (const cart of carts) {
      if (!cart || cart.done) continue;
      const target = cartPixel(cart);
      if (!target) continue;
      live.add(cart.id);
      // smooth motion between the 500ms progress steps (position still derives
      // from progress; this only interpolates the visual toward it each frame)
      let rp = cartRender[cart.id];
      if (!rp) rp = cartRender[cart.id] = { x: target.x, y: target.y };
      else { rp.x += (target.x - rp.x) * 0.25; rp.y += (target.y - rp.y) * 0.25; }
      const gc = goodColor(cart.goodId);
      if (zoomedOut) {
        ctx.fillStyle = gc; ctx.strokeStyle = "rgba(0,0,0,0.5)"; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.arc(rp.x, rp.y, SIZE * 0.22, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
      } else {
        drawCartToken(rp.x, rp.y, gc);
      }
    }
    // prune render cache for carts that vanished/finished
    for (const id in cartRender) if (!live.has(isNaN(+id) ? id : +id) && !live.has(id)) delete cartRender[id];
  }

  // ---- treasury HUD ------------------------------------------------------
  const treasuryValEl = document.getElementById("treasuryVal");
  const tariffValEl = document.getElementById("tariffVal");
  function tariffRate() {
    const tr = CONFIG.trade && CONFIG.trade.tariffRate;
    return typeof tr === "number" ? tr : 0.25;   // GDD §6.3 baseline
  }
  function updateTreasuryHud() {
    treasuryValEl.textContent = Math.round(state.treasury || 0).toLocaleString();
    tariffValEl.textContent = "· " + Math.round(tariffRate() * 100) + "% tariff";
  }

  // ---- castle warehouse panel -------------------------------------------
  const castleEl = document.getElementById("castlePanel");
  const cwBodyEl = document.getElementById("cwBody");
  const cwTreasuryEl = document.getElementById("cwTreasury");
  const cwMarketEl = document.getElementById("cwMarket");
  const cwCapTextEl = document.getElementById("cwCapText");
  const cwCapBarEl = document.getElementById("cwCapBar");
  let castleOpen = false;

  function nearestTownToCastle() {
    let best = null, bd = Infinity;
    for (const t of state.towns) {
      const d = HexMath.dist(0, 0, t.q, t.r);
      if (d < bd) { bd = d; best = t; }
    }
    return best;
  }
  // Local market price the player trades against: the nearest town's price, or
  // the good's base price if there are no towns yet.
  function castlePriceOf(goodId) {
    const t = nearestTownToCastle();
    if (t) return priceOf(t, goodId);
    const g = CONFIG.goods[goodId];
    return g ? g.basePrice : 0;
  }
  function warehouseUsed() {
    let s = 0; const w = state.warehouse || {};
    for (const k in w) s += w[k] || 0;
    return s;
  }

  function castleBuy(goodId) {
    const unit = CONFIG.castle.tradeUnit;
    const cap = CONFIG.castle.warehouseCapacity;
    const price = castlePriceOf(goodId);
    const cost = price * unit;
    const treas = state.treasury || 0;
    if (treas < cost) return;                       // can't afford
    if (warehouseUsed() + unit > cap) return;       // capacity limited
    state.treasury = treas - cost;                  // player spends tariff gold
    state.warehouse[goodId] = (state.warehouse[goodId] || 0) + unit;
    afterCastleTrade();
  }
  function castleSell(goodId) {
    const have = state.warehouse[goodId] || 0;
    if (have <= 0) return;
    const unit = Math.min(CONFIG.castle.tradeUnit, have);
    const price = castlePriceOf(goodId);
    state.warehouse[goodId] = have - unit;
    if (state.warehouse[goodId] <= 0) delete state.warehouse[goodId];
    state.treasury = (state.treasury || 0) + price * unit;   // player earns gold
    afterCastleTrade();
  }
  function afterCastleTrade() {
    renderCastlePanel();
    updateTreasuryHud();
    scheduleSave();
  }

  function renderCastlePanel() {
    if (!castleOpen) return;
    const unit = CONFIG.castle.tradeUnit;
    const cap = CONFIG.castle.warehouseCapacity;
    const used = warehouseUsed();
    const treas = state.treasury || 0;
    const town = nearestTownToCastle();
    cwTreasuryEl.textContent = Math.round(treas).toLocaleString() + " g";
    cwMarketEl.textContent = town ? ("Town #" + town.id) : "base prices";
    cwCapTextEl.textContent = Math.round(used) + " / " + cap;
    cwCapBarEl.style.width = Math.max(0, Math.min(100, used / cap * 100)) + "%";

    const ids = Object.keys(CONFIG.goods).sort((a, b) =>
      CONFIG.goods[a].tier - CONFIG.goods[b].tier || a.localeCompare(b));
    let rows = "";
    for (const id of ids) {
      const price = castlePriceOf(id);
      const held = state.warehouse[id] || 0;
      const canBuy = treas >= price * unit && used + unit <= cap;
      const canSell = held > 0;
      rows += `<tr class="${held > 0 ? "" : "dim"}">
        <td><span class="cw-dot" style="background:${goodColor(id)}"></span>${esc(GOOD_LABEL(id))}</td>
        <td>${fmt(price)}g</td>
        <td>${fmt(held)}</td>
        <td>
          <button class="cw-btn buy" data-buy="${id}" ${canBuy ? "" : "disabled"}>Buy ${unit}</button>
          <button class="cw-btn sell" data-sell="${id}" ${canSell ? "" : "disabled"}>Sell ${unit}</button>
        </td></tr>`;
    }
    cwBodyEl.innerHTML = `<table class="cw-tbl">
      <tr><th>Good</th><th>Price</th><th>Held</th><th></th></tr>${rows}</table>`;
  }

  function openCastlePanel() {
    // mutually exclusive with the town panel
    if (window.TownUI && typeof window.TownUI.closeTownPanel === "function") window.TownUI.closeTownPanel();
    castleOpen = true;
    castleEl.classList.remove("hidden");
    castleEl.setAttribute("aria-hidden", "false");
    renderCastlePanel();
  }
  function closeCastlePanel() {
    castleOpen = false;
    castleEl.classList.add("hidden");
    castleEl.setAttribute("aria-hidden", "true");
  }

  // buy/sell via delegation (rows are re-rendered each trade)
  cwBodyEl.addEventListener("click", (e) => {
    const b = e.target.closest("button[data-buy]");
    const s = e.target.closest("button[data-sell]");
    if (b) castleBuy(b.dataset.buy);
    else if (s) castleSell(s.dataset.sell);
  });
  document.getElementById("cwClose").addEventListener("click", closeCastlePanel);

  // Castle-click detection at the center hex (0,0), pan-mode only. Own down-pos
  // so a camera drag is not read as a click (mirrors the TOWN-UI pattern).
  let castleDown = null;
  canvas.addEventListener("mousedown", (e) => { if (e.button === 0) castleDown = { x: e.clientX, y: e.clientY }; });
  canvas.addEventListener("click", (e) => {
    const down = castleDown; castleDown = null;
    if (!down) return;
    if (Math.abs(e.clientX - down.x) + Math.abs(e.clientY - down.y) > 5) return;
    if (state.mode !== "pan") return;
    const h = hexAtScreen(e.clientX, e.clientY);
    if (h.q === 0 && h.r === 0) openCastlePanel();
    else if (castleOpen) closeCastlePanel();
  });

  // Live refresh: keep treasury HUD + open castle panel current as prices/trade tick.
  updateTreasuryHud();
  setInterval(() => { updateTreasuryHud(); if (castleOpen) renderCastlePanel(); }, 500);

  // Expose for the headless smoke test / console debugging.
  window.CastleUI = { openCastlePanel, closeCastlePanel, castleBuy, castleSell,
                      updateTreasuryHud, drawCarts, cartPixel,
                      get isOpen() { return castleOpen; } };
  // === CARTS + CASTLE-UI END ===

  // ---------------------------------------------------------------
  // Boot
  // ---------------------------------------------------------------
  resize();
  if (!loadGame()) newGame(randomSeed());
  setMode(state.mode);
  requestAnimationFrame(frame);

  // expose a little for debugging in the console
  window.TW = { state, CONFIG, HexMath, MapGen, newGame };
})();
</script>
</body>
</html>
